<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Neon Drive — Music-Reactive Endless Road</title>
<meta name="description" content="A neon car cruising an endless night road that reacts to music. Bass boosts the glow, treble flashes the stars, beats bounce the car." />
<style>
  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%;background:#000;color:#fff;font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;overflow:hidden;-webkit-tap-highlight-color:transparent}
  button{font:inherit;cursor:pointer;border:0;background:none;color:inherit}
  input[type=range]{accent-color:#fff}
  #app{position:relative;width:100vw;height:100dvh;overflow:hidden}
  canvas{position:absolute;inset:0;width:100%;height:100%;display:block}
  .header{position:absolute;left:0;right:0;top:0;z-index:10;display:flex;justify-content:center;padding:12px;pointer-events:none}
  .title{font-size:10px;font-weight:800;letter-spacing:.25em;text-transform:uppercase}
  @media(min-width:640px){.title{font-size:12px;letter-spacing:.4em}.header{padding:16px}}
  .btn{position:absolute;z-index:20;border:2px solid;border-radius:8px;padding:6px 10px;font-size:9px;font-weight:800;letter-spacing:.2em;text-transform:uppercase;transition:transform .1s;background:rgba(0,0,0,.55)}
  .btn:active{transform:scale(.95)}
  @media(min-width:640px){.btn{padding:6px 12px;font-size:10px;letter-spacing:.25em}}
  #gameBtn{right:12px;top:12px}
  #radioBtn{left:12px;top:12px;display:none}
  @media(min-width:640px){#gameBtn{right:16px;top:16px}#radioBtn{left:16px;top:16px}}

  /* Boombox */
  #boombox{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:min(94vw,380px);z-index:10;transition:opacity .3s}
  @media(min-width:768px){#boombox{left:16px;bottom:50%;transform:translateY(50%);width:min(78vw,380px)}}
  #boombox.hidden{display:none}
  .antenna{position:relative;margin:0 auto;height:40px;width:100%}
  .antenna .rod{position:absolute;left:18%;bottom:0;height:40px;width:2px;transform-origin:bottom;transform:rotate(-12deg)}
  .antenna .tip{position:absolute;left:18%;bottom:36px;width:8px;height:8px;border-radius:50%;transform:translateX(-50%)}
  .antenna .handle{position:absolute;left:50%;bottom:0;height:24px;width:160px;transform:translateX(-50%);border:2px solid;border-bottom:0;border-radius:9999px 9999px 0 0;background:rgba(0,0,0,.5)}
  .body{position:relative;border:2px solid;border-radius:16px;padding:12px;backdrop-filter:blur(8px);background:linear-gradient(180deg,rgba(20,10,35,.92),rgba(8,4,18,.95))}
  .hideX{position:absolute;top:-8px;right:8px;width:24px;height:24px;display:grid;place-items:center;border:2px solid;border-radius:50%;font-size:10px;font-weight:800;background:rgba(0,0,0,.7);z-index:2}
  .row{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px}
  .brand{font-size:9px;font-weight:800;letter-spacing:.3em;text-transform:uppercase}
  .pwr{display:flex;align-items:center;gap:6px}
  .led{width:6px;height:6px;border-radius:50%;background:#333}
  .led.on{background:#22c55e;box-shadow:0 0 6px #22c55e;animation:pulse 1.4s infinite}
  @keyframes pulse{50%{opacity:.5}}
  .speakers{display:flex;gap:8px;align-items:stretch;margin-bottom:12px}
  .speaker{position:relative;display:grid;place-items:center;width:64px;height:64px;border:2px solid;border-radius:50%;background:radial-gradient(circle at 30% 30%,rgba(255,255,255,.08),rgba(0,0,0,.85) 70%);flex-shrink:0}
  .speaker .ring{position:absolute;inset:8px;border:1px solid;border-radius:50%}
  .speaker .cone{position:relative;width:32px;height:32px;display:grid;place-items:center;border:2px solid;border-radius:50%}
  .speaker.playing .cone{animation:pulse 1.4s infinite}
  .speaker .cap{width:12px;height:12px;border-radius:50%}
  .deck{flex:1;border:1px solid;border-radius:6px;padding:8px;background:linear-gradient(180deg,rgba(0,0,0,.7),rgba(20,10,30,.5))}
  .tape{display:flex;align-items:center;justify-content:space-around;height:48px;padding:0 12px;border-radius:2px;background:rgba(0,0,0,.6);border:1px solid}
  .reel{position:relative;width:28px;height:28px;border:2px solid;border-radius:50%;background:radial-gradient(circle,#1a1a1a 30%,#000 70%)}
  .reel.spin{animation:spin 1.2s linear infinite}
  .reel.spin.rev{animation-direction:reverse}
  @keyframes spin{to{transform:rotate(360deg)}}
  .reel .hub{position:absolute;left:50%;top:50%;width:8px;height:8px;border-radius:50%;transform:translate(-50%,-50%)}
  .reel .spoke{position:absolute;left:50%;top:50%;width:28px;height:1.5px}
  .tape .bar{height:4px;flex:1;margin:0 8px;border-radius:9999px;opacity:.6}
  .meta{text-align:center;margin-top:6px}
  .meta .sub{font-size:8px;font-weight:800;letter-spacing:.25em;text-transform:uppercase;opacity:.7}
  .meta .ttl{font-family:ui-monospace,monospace;font-size:11px;font-weight:800;color:#fff;line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .meta .art{font-size:8px;opacity:.6;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .level{display:flex;align-items:flex-end;justify-content:center;gap:2px;height:12px;margin-bottom:8px}
  .level i{display:block;width:4px;height:2px;transition:all .1s}
  .tuner{display:flex;align-items:center;height:16px;padding:0 4px;border:1px solid;border-radius:2px;background:rgba(0,0,0,.5);margin-bottom:12px;position:relative}
  .tuner .freqs{display:flex;justify-content:space-between;width:100%;font-family:ui-monospace,monospace;font-size:7px;opacity:.6}
  .tuner .needle{position:absolute;top:-2px;width:2px;height:18px;background:#ef4444;box-shadow:0 0 6px #ef4444;transition:left .3s}
  .controls{display:flex;align-items:center;justify-content:center;gap:8px}
  .ctrl{display:grid;place-items:center;width:36px;height:36px;border:2px solid;border-radius:50%;background:rgba(0,0,0,.4);transition:transform .1s}
  .ctrl.big{width:48px;height:48px}
  .ctrl:active{transform:scale(.95)}
  .vol{margin-left:8px;display:flex;align-items:center;gap:6px}
  .vol input{width:64px;height:4px;border-radius:9999px;-webkit-appearance:none;appearance:none}
  .stations{margin-top:12px;display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
  .station{display:flex;flex-direction:column;align-items:center;padding:4px;border:1px solid;border-radius:4px;font-size:9px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;transition:all .2s;background:transparent}
  .station .num{font-size:10px}
  .station .name{font-size:7px;opacity:.8}
  .feet{position:absolute;bottom:-8px;width:32px;height:8px;border:1px solid;border-radius:0 0 6px 6px;background:#0a0a0a}
  .feet.l{left:24px}.feet.r{right:24px}

  /* Game overlay */
  #game{position:absolute;inset:0;z-index:15;pointer-events:none;display:none}
  #game.on{display:block}
  #gameCanvas{position:absolute;inset:0;width:100%;height:100%}
  .hud{position:absolute;left:50%;top:56px;transform:translateX(-50%);white-space:nowrap;border:1px solid;border-radius:6px;padding:4px 8px;font-size:9px;letter-spacing:.2em;text-transform:uppercase;background:rgba(0,0,0,.55)}
  @media(min-width:640px){.hud{top:64px;padding:6px 12px;font-size:10px;letter-spacing:.25em}}
  .dpad{position:absolute;left:0;right:0;bottom:16px;display:flex;justify-content:space-between;padding:0 16px;pointer-events:none}
  .dpad .grp{display:flex;gap:8px;pointer-events:auto}
  .dpad .grp.v{flex-direction:column;align-items:center}
  .touch{width:56px;height:56px;display:grid;place-items:center;border:2px solid;border-radius:50%;font-size:18px;font-weight:800;background:rgba(0,0,0,.55);user-select:none;touch-action:none}
  .touch:active{transform:scale(.9)}
  @media(min-width:640px){.dpad{display:none}}
  .over{position:absolute;inset:0;display:none;place-items:center;background:rgba(0,0,0,.55);pointer-events:auto}
  .over.on{display:grid}
  .over .card{border:2px solid;border-radius:12px;padding:24px;text-align:center;background:rgba(10,5,20,.85)}
  .over .ttl{font-size:12px;font-weight:800;letter-spacing:.4em;text-transform:uppercase;margin-bottom:8px}
  .over .scr{font-family:ui-monospace,monospace;font-size:24px;color:#fff;margin-bottom:4px}
  .over .hi{font-family:ui-monospace,monospace;font-size:14px;color:#ffd84a;text-shadow:0 0 8px #ffd84a;margin-bottom:4px}
  .over .new{font-size:10px;font-weight:800;letter-spacing:.35em;text-transform:uppercase;color:#ffd84a;text-shadow:0 0 10px #ffd84a;margin-bottom:12px;animation:pulse 1.4s infinite}
  .retry{padding:8px 16px;border:2px solid;border-radius:6px;font-size:11px;font-weight:800;letter-spacing:.25em;text-transform:uppercase;color:#000}

  /* svg icons stroke */
  .ic{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .ic.lg{width:20px;height:20px}
  .ic.sm{width:14px;height:14px}
</style>
</head>
<body>
<div id="app">
  <canvas id="bg"></canvas>

  <header class="header"><h1 id="title" class="title">▮ Neon Drive ▮</h1></header>

  <button id="radioBtn" class="btn">♪ Radio</button>
  <button id="gameBtn" class="btn">▶ Game</button>

  <!-- Game overlay -->
  <div id="game">
    <canvas id="gameCanvas"></canvas>
    <div id="hud" class="hud">score 0</div>
    <div class="dpad">
      <div class="grp"><button class="touch" data-k="left">◀</button><button class="touch" data-k="right">▶</button></div>
      <div class="grp v"><button class="touch" data-k="up">▲</button><button class="touch" data-k="down">▼</button></div>
    </div>
    <div id="over" class="over">
      <div class="card">
        <div class="ttl">▮ Crashed ▮</div>
        <div class="scr">Score: <span id="finalScore">0</span></div>
        <div class="hi">★ High Score: <span id="finalHi">0</span></div>
        <div id="newRec" class="new" style="display:none">✦ New Record ✦</div>
        <button id="retry" class="retry">Retry</button>
      </div>
    </div>
  </div>

  <!-- Boombox -->
  <aside id="boombox">
    <button id="hideX" class="hideX">✕</button>
    <div class="antenna">
      <div class="rod"></div><div class="tip"></div><div class="handle"></div>
    </div>
    <div class="body">
      <div class="row">
        <span class="brand">▮ NEON-X ▮ STEREO</span>
        <div class="pwr"><span class="brand" style="opacity:.5">PWR</span><span id="pwrLed" class="led"></span></div>
      </div>
      <div class="speakers">
        <div class="speaker" id="spkL"><div class="ring"></div><div class="cone"><div class="cap"></div></div></div>
        <div class="deck">
          <div class="tape">
            <div class="reel" id="reelL"><div class="hub"></div></div>
            <div class="bar"></div>
            <div class="reel rev" id="reelR"><div class="hub"></div></div>
          </div>
          <div class="meta">
            <div class="sub" id="metaSub">NEON://01 · SUN · 01/02</div>
            <div class="ttl" id="metaTtl">♪ —</div>
            <div class="art" id="metaArt">—</div>
          </div>
        </div>
        <div class="speaker" id="spkR"><div class="ring"></div><div class="cone"><div class="cap"></div></div></div>
      </div>
      <div class="level" id="level"></div>
      <div class="tuner">
        <div class="freqs"><span>88</span><span>92</span><span>96</span><span>100</span><span>104</span><span>108</span></div>
        <div class="needle" id="needle" style="left:20%"></div>
      </div>
      <div class="controls">
        <button class="ctrl" id="prevBtn"><svg class="ic" viewBox="0 0 24 24"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button>
        <button class="ctrl big" id="playBtn"><svg class="ic lg" id="playIcon" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg></button>
        <button class="ctrl" id="nextBtn"><svg class="ic" viewBox="0 0 24 24"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>
        <div class="vol"><svg class="ic sm" viewBox="0 0 24 24"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
          <input type="range" id="vol" min="0" max="1" step="0.01" value="0.6"/>
        </div>
      </div>
      <div class="stations" id="stations"></div>
      <div class="feet l"></div><div class="feet r"></div>
    </div>
  </aside>
</div>

<script>
// ============ DATA ============
const PALETTES = {
  miami: { sky1:"#1a0033",sky2:"#ff006e",sun1:"#ffe66d",sun2:"#ff006e",road:"#0a0014",grid:"#ff2a9d",car:"#ff3cac",glow:"#ff3cac" },
  tokyo: { sky1:"#02010a",sky2:"#1de9b6",sun1:"#00e5ff",sun2:"#7c4dff",road:"#01020a",grid:"#00e5ff",car:"#00e5ff",glow:"#00e5ff" },
  mono:  { sky1:"#000000",sky2:"#3a3a3a",sun1:"#ffffff",sun2:"#888888",road:"#050505",grid:"#ffffff",car:"#ffffff",glow:"#ffffff" },
  vapor: { sky1:"#0d0033",sky2:"#a06bff",sun1:"#ff77e9",sun2:"#7afcff",road:"#06001a",grid:"#a06bff",car:"#7afcff",glow:"#a06bff" },
};
// Audio files: point to live site so this file works standalone. Replace with ./audio/ if you self-host.
const AUDIO_BASE = "https://mricetower.lovable.app/audio";
const TRACKS = [
  { label:"NEON://01 · SUN",       palette:PALETTES.miami, horizon:"sun",       songs:[
    {title:"Last Friday Night (T.G.I.F.)", artist:"Katy Perry",       src:AUDIO_BASE+"/last-friday-night.mp3"},
    {title:"Ride",                         artist:"Twenty One Pilots",src:AUDIO_BASE+"/ride.mp3"} ]},
  { label:"NEON://02 · MOON",      palette:PALETTES.tokyo, horizon:"moon",      songs:[
    {title:"After Dark",                   artist:"Mr.Kitty",         src:AUDIO_BASE+"/after-dark.mp3"},
    {title:"Don't Stop The Music",         artist:"Rihanna",          src:AUDIO_BASE+"/dont-stop-the-music.mp3"} ]},
  { label:"NEON://03 · BLACK HOLE",palette:PALETTES.mono,  horizon:"blackhole", songs:[
    {title:"Forever Young",                artist:"Alphaville",       src:AUDIO_BASE+"/forever-young.mp3"},
    {title:"Coachella",                    artist:"—",                src:AUDIO_BASE+"/coachella.mp3"} ]},
  { label:"NEON://04 · GALAXY",    palette:PALETTES.vapor, horizon:"galaxy",    songs:[
    {title:"Right Round",                  artist:"Flo Rida ft. Ke$ha",src:AUDIO_BASE+"/right-round.mp3"},
    {title:"Trap Queen",                   artist:"Fetty Wap",         src:AUDIO_BASE+"/trap-queen.mp3"} ]},
];

// ============ STATE ============
let trackIdx=0, songIdx=0, playing=false, volume=0.6, gameMode=false, boomHidden=false;
let audioEl=null, audioCtx=null, analyser=null, srcNode=null;
let audioReady=false;
const pal = () => TRACKS[trackIdx].palette;
const song = () => TRACKS[trackIdx].songs[songIdx % TRACKS[trackIdx].songs.length];

// ============ AUDIO ============
function ensureAudio(){
  if(!audioEl){
    audioEl = new Audio();
    audioEl.preload = "auto";
    audioEl.playsInline = true;
    // NOTE: no crossOrigin — audio host lacks CORS headers, which would block playback.
    audioEl.addEventListener("ended", handleNext);
    audioEl.addEventListener("error", () => {
      playing = false;
      renderUI();
      console.warn("Audio failed to load.");
    });
  }
  return audioEl;
}
function ensureAnalyser(){
  if(analyser) return;
  try{
    const AC = window.AudioContext || window.webkitAudioContext;
    if(!AC || !audioEl) return;
    audioCtx = new AC();
    srcNode = audioCtx.createMediaElementSource(audioEl);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 512;
    analyser.smoothingTimeConstant = 0.8;
    srcNode.connect(analyser);
    analyser.connect(audioCtx.destination);
  }catch(err){
    console.warn("Analyser setup failed:", err);
    analyser = null;
  }
}
function setSongSource(){
  ensureAudio();
  const s = song();
  const fileName = s.src.split("/").pop();
  if(!audioEl.src || !audioEl.src.endsWith(fileName)){
    audioEl.src = s.src;
    audioReady = false;
  }
  audioEl.volume = volume;
}
function loadAndPlay(autoplay){
  setSongSource();
  if(autoplay){
    audioEl.play().then(()=>{ playing=true; audioReady=true; renderUI(); }).catch(err=>{
      playing=false;
      console.warn("Audio play blocked or unavailable:", err);
      renderUI();
    });
  }
}
async function handlePlay(){
  setSongSource();
  if(playing){
    audioEl.pause();
    playing=false;
  } else {
    try{
      await audioEl.play();
      // Skip Web Audio analyser for cross-origin audio without CORS:
      // createMediaElementSource on a tainted stream outputs silence.
      // ensureAnalyser();
      playing=true;
      audioReady=true;
      setBoomHidden(true);
    }catch(err){
      playing=false;
      console.warn("Audio play failed:", err);
    }
  }
  renderUI();
}
function handleNext(){
  const wasPlaying = playing;
  const tot = TRACKS[trackIdx].songs.length;
  if(songIdx+1<tot) songIdx++;
  else { trackIdx=(trackIdx+1)%TRACKS.length; songIdx=0; }
  loadAndPlay(wasPlaying); renderUI();
}
function handlePrev(){
  const wasPlaying = playing;
  if(songIdx>0) songIdx--;
  else { trackIdx=(trackIdx-1+TRACKS.length)%TRACKS.length; songIdx=TRACKS[trackIdx].songs.length-1; }
  loadAndPlay(wasPlaying); renderUI();
}
function pickStation(i){ const wasPlaying = playing; trackIdx=i; songIdx=0; loadAndPlay(wasPlaying); renderUI(); }
function setBoomHidden(v){ boomHidden=v; renderUI(); }

// ============ UI RENDER ============
function applyVar(el, prop, val){ el.style[prop]=val; }
function renderUI(){
  const p = pal();
  const t = TRACKS[trackIdx];
  const s = song();
  document.getElementById("title").style.color=p.car;
  document.getElementById("title").style.textShadow=`0 0 12px ${p.glow}`;

  const gameBtn = document.getElementById("gameBtn");
  gameBtn.style.borderColor=p.car;
  gameBtn.style.color=gameMode?"#000":p.car;
  gameBtn.style.background=gameMode?p.car:"rgba(0,0,0,.55)";
  gameBtn.style.boxShadow=`0 0 12px ${p.glow}99`;
  gameBtn.style.textShadow=gameMode?"none":`0 0 8px ${p.glow}`;
  gameBtn.textContent = gameMode ? "✕ Exit" : "▶ Game";

  const radioBtn = document.getElementById("radioBtn");
  radioBtn.style.borderColor=p.car; radioBtn.style.color=p.car;
  radioBtn.style.boxShadow=`0 0 12px ${p.glow}99`;
  radioBtn.style.textShadow=`0 0 8px ${p.glow}`;
  radioBtn.style.display=(!gameMode && boomHidden)?"block":"none";

  const boom = document.getElementById("boombox");
  boom.style.display=(!gameMode && !boomHidden)?"block":"none";
  boom.style.filter=`drop-shadow(0 0 24px ${p.glow}88)`;

  // body+borders
  document.querySelectorAll("#boombox .body, #boombox .speaker, #boombox .speaker .ring, #boombox .speaker .cone, #boombox .deck, #boombox .tape, #boombox .reel, #boombox .tuner, #boombox .ctrl, #boombox .station, #boombox .feet, #boombox .antenna .handle, #boombox .hideX").forEach(el=>el.style.borderColor=p.car);
  document.querySelectorAll("#boombox .speaker .cap, #boombox .antenna .tip").forEach(el=>{el.style.background=p.car;el.style.boxShadow=`0 0 8px ${p.glow}`});
  document.querySelector("#boombox .antenna .rod").style.background=`linear-gradient(to top, ${p.car}, transparent)`;
  document.querySelector("#boombox .body").style.boxShadow=`inset 0 1px 0 ${p.car}44, inset 0 -20px 30px rgba(0,0,0,.7)`;
  document.querySelectorAll("#boombox .brand, #boombox .freqs span, #boombox .sub, #boombox .art, #boombox .vol svg").forEach(el=>el.style.color=p.car);
  document.querySelector("#boombox .tape .bar").style.background=`linear-gradient(to right,${p.car},${p.car}22)`;
  document.querySelectorAll("#boombox .reel .hub").forEach(el=>el.style.background=p.car);
  document.getElementById("metaTtl").style.textShadow=`0 0 8px ${p.glow}`;
  document.getElementById("metaSub").textContent = `${t.label} · ${String(songIdx+1).padStart(2,"0")}/${String(t.songs.length).padStart(2,"0")}`;
  document.getElementById("metaTtl").textContent = "♪ "+s.title;
  document.getElementById("metaArt").textContent = s.artist;
  document.getElementById("pwrLed").className = "led"+(playing?" on":"");
  document.getElementById("reelL").classList.toggle("spin", playing);
  document.getElementById("reelR").classList.toggle("spin", playing);
  document.getElementById("spkL").classList.toggle("playing", playing);
  document.getElementById("spkR").classList.toggle("playing", playing);
  document.getElementById("needle").style.left = `${20 + trackIdx*18}%`;

  // play icon
  const playIcon = document.getElementById("playIcon");
  playIcon.innerHTML = playing
    ? '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>'
    : '<polygon points="5 3 19 12 5 21 5 3"/>';

  // stations
  const st = document.getElementById("stations");
  st.innerHTML = TRACKS.map((tr,i)=>`
    <button class="station" data-i="${i}" style="border-color:${p.car};background:${i===trackIdx?p.car:"transparent"};color:${i===trackIdx?"#000":p.car};box-shadow:${i===trackIdx?`0 0 10px ${p.glow}`:"none"}">
      <span class="num">0${i+1}</span><span class="name">${tr.horizon}</span>
    </button>`).join("");
  st.querySelectorAll("button").forEach(b=>b.addEventListener("click",()=>pickStation(+b.dataset.i)));

  // level meter base
  const lvl = document.getElementById("level");
  if(lvl.childElementCount!==24){ lvl.innerHTML = Array.from({length:24}).map(()=>"<i></i>").join(""); }

  document.getElementById("game").classList.toggle("on", gameMode);
}

// ============ BACKGROUND CANVAS ============
const bg = document.getElementById("bg");
const ctx2d = bg.getContext("2d");
let bgW=0,bgH=0;
function resizeBg(){
  const dpr = Math.min(window.devicePixelRatio||1,2);
  bgW = bg.clientWidth; bgH = bg.clientHeight;
  bg.width = bgW*dpr; bg.height = bgH*dpr;
  ctx2d.setTransform(dpr,0,0,dpr,0,0);
}
window.addEventListener("resize",()=>{resizeBg(); resizeGame();});
resizeBg();

const stars = Array.from({length:160},()=>({x:Math.random(),y:Math.random()*0.55,s:Math.random()*1.6+0.3,tw:Math.random()}));
const particles = Array.from({length:80},()=>({x:(Math.random()-0.5)*2,y:Math.random(),z:Math.random()}));
let roadOffset=0,lastBeat=0,beatPulse=0,strobe=0,prevBass=0;

function drawBg(time){
  const p = pal(); const w=bgW,h=bgH;
  let bass=0,mid=0,treble=0;
  if(analyser){
    const arr = new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteFrequencyData(arr);
    const n=arr.length;
    const sum=(a,b)=>{let s=0;for(let i=a;i<b;i++)s+=arr[i];return s/((b-a)*255);};
    bass=sum(0,Math.floor(n*0.08));
    mid =sum(Math.floor(n*0.08),Math.floor(n*0.4));
    treble=sum(Math.floor(n*0.4),n);
  }
  if(bass-prevBass>0.18 && time-lastBeat>180){ lastBeat=time; beatPulse=1; strobe=1; }
  prevBass=bass; beatPulse*=0.9; strobe*=0.85;

  // sky
  const sky = ctx2d.createLinearGradient(0,0,0,h*0.65);
  sky.addColorStop(0,p.sky1); sky.addColorStop(1,p.sky2);
  ctx2d.fillStyle=sky; ctx2d.fillRect(0,0,w,h*0.65);

  // stars
  for(const st of stars){
    const tw=0.5+0.5*Math.sin(time*0.003+st.tw*10);
    const a=Math.min(1,0.35+tw*0.4+treble*1.2);
    ctx2d.fillStyle=`rgba(255,255,255,${a})`;
    const size=st.s*(1+treble*2);
    ctx2d.fillRect(st.x*w,st.y*h,size,size);
  }

  // horizon body
  const kind = TRACKS[trackIdx].horizon;
  const baseR = h*0.18*(1+bass*0.15);
  const hCx = w*0.5;
  const hCy = gameMode ? h*0.28 : h*0.55;

  if(kind==="sun"){
    const corona=ctx2d.createRadialGradient(hCx,hCy,baseR*0.8,hCx,hCy,baseR*2.6);
    corona.addColorStop(0,"rgba(255,180,80,0.45)");
    corona.addColorStop(0.5,"rgba(255,80,140,0.18)");
    corona.addColorStop(1,"rgba(0,0,0,0)");
    ctx2d.fillStyle=corona; ctx2d.fillRect(hCx-baseR*3,hCy-baseR*3,baseR*6,baseR*6);
    ctx2d.save(); ctx2d.translate(hCx,hCy); ctx2d.rotate(time*0.00012);
    for(let i=0;i<18;i++){
      ctx2d.rotate((Math.PI*2)/18);
      const rg=ctx2d.createLinearGradient(0,0,0,-baseR*2.4);
      rg.addColorStop(0,`rgba(255,220,140,${0.18+bass*0.25})`);
      rg.addColorStop(1,"rgba(255,220,140,0)");
      ctx2d.fillStyle=rg;
      ctx2d.beginPath();
      ctx2d.moveTo(-baseR*0.04,0); ctx2d.lineTo(baseR*0.04,0);
      ctx2d.lineTo(baseR*0.18,-baseR*2.4); ctx2d.lineTo(-baseR*0.18,-baseR*2.4);
      ctx2d.closePath(); ctx2d.fill();
    }
    ctx2d.restore();
    const sunG=ctx2d.createLinearGradient(0,hCy-baseR,0,hCy+baseR);
    sunG.addColorStop(0,p.sun1); sunG.addColorStop(0.55,"#ff8a3d"); sunG.addColorStop(1,p.sun2);
    ctx2d.fillStyle=sunG; ctx2d.beginPath(); ctx2d.arc(hCx,hCy,baseR,0,Math.PI*2); ctx2d.fill();
    ctx2d.globalCompositeOperation="destination-out";
    for(let i=0;i<9;i++){ const y=hCy+baseR*0.25+i*7; ctx2d.fillRect(hCx-baseR,y,baseR*2,2+i*0.9); }
    ctx2d.globalCompositeOperation="source-over";
    const hi=ctx2d.createRadialGradient(hCx-baseR*0.3,hCy-baseR*0.35,0,hCx,hCy,baseR);
    hi.addColorStop(0,"rgba(255,255,220,0.55)"); hi.addColorStop(1,"rgba(255,255,220,0)");
    ctx2d.fillStyle=hi; ctx2d.beginPath(); ctx2d.arc(hCx,hCy,baseR,0,Math.PI*2); ctx2d.fill();
  } else if(kind==="moon"){
    const halo=ctx2d.createRadialGradient(hCx,hCy,baseR*0.6,hCx,hCy,baseR*2.4);
    halo.addColorStop(0,"rgba(220,235,255,0.4)"); halo.addColorStop(0.5,"rgba(150,180,230,0.12)"); halo.addColorStop(1,"rgba(0,0,0,0)");
    ctx2d.fillStyle=halo; ctx2d.fillRect(hCx-baseR*2.6,hCy-baseR*2.6,baseR*5.2,baseR*5.2);
    const mg=ctx2d.createRadialGradient(hCx-baseR*0.35,hCy-baseR*0.4,baseR*0.1,hCx,hCy,baseR);
    mg.addColorStop(0,"#fbfcff"); mg.addColorStop(0.6,"#dde2ec"); mg.addColorStop(1,"#8b94a8");
    ctx2d.fillStyle=mg; ctx2d.beginPath(); ctx2d.arc(hCx,hCy,baseR,0,Math.PI*2); ctx2d.fill();
    ctx2d.save(); ctx2d.beginPath(); ctx2d.arc(hCx,hCy,baseR,0,Math.PI*2); ctx2d.clip();
    const maria=[[-0.3,-0.15,0.45,0.18],[0.35,0.15,0.35,0.15],[-0.05,0.4,0.4,0.2]];
    for(const [mx,my,mr,ma] of maria){
      const g=ctx2d.createRadialGradient(hCx+mx*baseR,hCy+my*baseR,0,hCx+mx*baseR,hCy+my*baseR,mr*baseR);
      g.addColorStop(0,`rgba(90,100,120,${ma})`); g.addColorStop(1,"rgba(90,100,120,0)");
      ctx2d.fillStyle=g; ctx2d.fillRect(hCx-baseR,hCy-baseR,baseR*2,baseR*2);
    }
    const craters=[[-0.42,-0.18,0.14],[0.28,-0.08,0.1],[-0.12,0.32,0.13],[0.42,0.32,0.08],[0.08,-0.5,0.07],[-0.55,0.1,0.06],[0.55,-0.25,0.05],[-0.2,-0.55,0.05],[0.2,0.55,0.06],[0,0.05,0.04],[-0.35,0.5,0.05],[0.5,0.05,0.04]];
    for(const [cx,cy,cr] of craters){
      const ccx=hCx+cx*baseR, ccy=hCy+cy*baseR, rr=cr*baseR;
      ctx2d.fillStyle="rgba(60,70,90,0.55)";
      ctx2d.beginPath(); ctx2d.arc(ccx,ccy,rr,0,Math.PI*2); ctx2d.fill();
      ctx2d.strokeStyle="rgba(255,255,255,0.5)"; ctx2d.lineWidth=1;
      ctx2d.beginPath(); ctx2d.arc(ccx-rr*0.15,ccy-rr*0.15,rr*0.9,Math.PI*0.9,Math.PI*1.9); ctx2d.stroke();
    }
    ctx2d.restore();
    const term=ctx2d.createLinearGradient(hCx-baseR,hCy,hCx+baseR,hCy);
    term.addColorStop(0,"rgba(0,0,0,0)"); term.addColorStop(1,"rgba(0,0,0,0.35)");
    ctx2d.fillStyle=term; ctx2d.beginPath(); ctx2d.arc(hCx,hCy,baseR,0,Math.PI*2); ctx2d.fill();
  } else if(kind==="blackhole"){
    const lens=ctx2d.createRadialGradient(hCx,hCy,baseR,hCx,hCy,baseR*2.8);
    lens.addColorStop(0,"rgba(255,255,255,0)"); lens.addColorStop(0.35,"rgba(180,200,255,0.18)");
    lens.addColorStop(0.55,"rgba(255,200,140,0.2)"); lens.addColorStop(1,"rgba(0,0,0,0)");
    ctx2d.fillStyle=lens; ctx2d.fillRect(hCx-baseR*3,hCy-baseR*3,baseR*6,baseR*6);
    ctx2d.save(); ctx2d.translate(hCx,hCy); const tilt=time*0.0006; ctx2d.rotate(-0.25);
    for(let layer=0;layer<3;layer++){
      ctx2d.save(); ctx2d.scale(1,0.28+layer*0.04); ctx2d.rotate(tilt*(1+layer*0.15));
      const r1=baseR*(1.05+layer*0.15), r2=baseR*(2+layer*0.25);
      const ring=ctx2d.createRadialGradient(0,0,r1,0,0,r2);
      ring.addColorStop(0,"rgba(255,255,255,0)");
      ring.addColorStop(0.35, layer===0?"rgba(255,230,180,0.95)":"rgba(255,180,220,0.55)");
      ring.addColorStop(0.7,"rgba(180,160,255,0.4)");
      ring.addColorStop(1,"rgba(0,0,0,0)");
      ctx2d.fillStyle=ring; ctx2d.beginPath(); ctx2d.arc(0,0,r2,0,Math.PI*2); ctx2d.fill();
      ctx2d.restore();
    }
    ctx2d.save(); ctx2d.scale(1,0.3); ctx2d.rotate(tilt);
    const hot=ctx2d.createRadialGradient(-baseR*1.5,0,0,-baseR*1.5,0,baseR*0.8);
    hot.addColorStop(0,"rgba(255,255,255,1)"); hot.addColorStop(1,"rgba(255,200,120,0)");
    ctx2d.fillStyle=hot; ctx2d.fillRect(-baseR*2.5,-baseR,baseR*2,baseR*2);
    ctx2d.restore(); ctx2d.restore();
    ctx2d.strokeStyle="rgba(255,240,200,0.9)"; ctx2d.lineWidth=2;
    ctx2d.shadowColor="rgba(255,220,160,0.9)"; ctx2d.shadowBlur=18;
    ctx2d.beginPath(); ctx2d.arc(hCx,hCy,baseR*1.02,0,Math.PI*2); ctx2d.stroke();
    ctx2d.shadowBlur=0;
    ctx2d.fillStyle="#000"; ctx2d.beginPath(); ctx2d.arc(hCx,hCy,baseR*0.95,0,Math.PI*2); ctx2d.fill();
  } else if(kind==="galaxy"){
    const haze=ctx2d.createRadialGradient(hCx,hCy,baseR*0.4,hCx,hCy,baseR*2.8);
    haze.addColorStop(0,"rgba(180,140,255,0.35)"); haze.addColorStop(0.5,"rgba(120,80,200,0.12)"); haze.addColorStop(1,"rgba(0,0,0,0)");
    ctx2d.fillStyle=haze; ctx2d.fillRect(hCx-baseR*3,hCy-baseR*3,baseR*6,baseR*6);
    ctx2d.save(); ctx2d.translate(hCx,hCy); ctx2d.rotate(time*0.00025); ctx2d.scale(1,0.55);
    const arms=5;
    for(let a=0;a<arms;a++){
      ctx2d.save(); ctx2d.rotate(((Math.PI*2)/arms)*a);
      for(let i=4;i<140;i++){
        const t=i/140, r=t*baseR*2.4, ang=t*7.5;
        const px=Math.cos(ang)*r, py=Math.sin(ang)*r;
        for(let j=0;j<3;j++){
          const jx=px+(Math.sin(i*1.7+j)*(1-t)*6);
          const jy=py+(Math.cos(i*1.3+j)*(1-t)*6);
          const a2=(1-t)*0.85; const hue=(i+j*13)%4;
          ctx2d.fillStyle = hue===0?`rgba(255,180,255,${a2})`:hue===1?`rgba(150,200,255,${a2})`:hue===2?`rgba(255,240,200,${a2})`:`rgba(200,160,255,${a2})`;
          const s=(1-t)*2.4+0.3; ctx2d.fillRect(jx,jy,s,s);
        }
      }
      ctx2d.strokeStyle="rgba(20,5,40,0.35)"; ctx2d.lineWidth=3;
      ctx2d.beginPath();
      for(let i=6;i<120;i++){
        const t=i/120, r=t*baseR*2.2, ang=t*7.5+0.25;
        const px=Math.cos(ang)*r, py=Math.sin(ang)*r;
        if(i===6) ctx2d.moveTo(px,py); else ctx2d.lineTo(px,py);
      }
      ctx2d.stroke(); ctx2d.restore();
    }
    const core=ctx2d.createRadialGradient(0,0,0,0,0,baseR*1.2);
    core.addColorStop(0,"rgba(255,250,255,1)"); core.addColorStop(0.25,"rgba(255,210,255,0.85)");
    core.addColorStop(0.6,"rgba(200,140,255,0.35)"); core.addColorStop(1,"rgba(0,0,0,0)");
    ctx2d.fillStyle=core; ctx2d.fillRect(-baseR*1.5,-baseR*1.5,baseR*3,baseR*3);
    ctx2d.fillStyle="#fff"; ctx2d.beginPath(); ctx2d.arc(0,0,baseR*0.08,0,Math.PI*2); ctx2d.fill();
    ctx2d.restore();
  }

  // ground
  ctx2d.fillStyle=p.road; ctx2d.fillRect(0,h*0.65,w,h*0.35);

  // perspective grid (bass)
  const horizon = h*0.65;
  roadOffset += 2+bass*14+mid*4;
  ctx2d.strokeStyle=p.grid; ctx2d.shadowColor=p.glow;
  ctx2d.shadowBlur=12+bass*30; ctx2d.globalAlpha=0.45+bass*0.5; ctx2d.lineWidth=1.5;
  for(let i=0;i<18;i++){
    const t=((i*60+roadOffset)%1080)/1080;
    const y=horizon+Math.pow(t,2.2)*(h-horizon);
    const spread=(y-horizon)/(h-horizon);
    ctx2d.beginPath(); ctx2d.moveTo(w*0.5-spread*w*0.9,y); ctx2d.lineTo(w*0.5+spread*w*0.9,y); ctx2d.stroke();
  }
  for(let i=-10;i<=10;i++){
    ctx2d.beginPath(); ctx2d.moveTo(w*0.5+i*12,horizon); ctx2d.lineTo(w*0.5+i*w*0.18,h); ctx2d.stroke();
  }
  ctx2d.globalAlpha=1; ctx2d.shadowBlur=0;

  // road surface
  const roadY=t=>horizon+Math.pow(t,2.2)*(h-horizon);
  const roadHalf=t=>((roadY(t)-horizon)/(h-horizon))*w*0.9;
  const asphalt=ctx2d.createLinearGradient(0,horizon,0,h);
  asphalt.addColorStop(0,"rgba(0,0,0,0.55)"); asphalt.addColorStop(0.6,"rgba(0,0,0,0.15)"); asphalt.addColorStop(1,"rgba(255,255,255,0.04)");
  ctx2d.fillStyle=asphalt;
  ctx2d.beginPath();
  ctx2d.moveTo(w*0.5-roadHalf(0),roadY(0)); ctx2d.lineTo(w*0.5+roadHalf(0),roadY(0));
  ctx2d.lineTo(w*0.5+roadHalf(1),roadY(1)); ctx2d.lineTo(w*0.5-roadHalf(1),roadY(1));
  ctx2d.closePath(); ctx2d.fill();

  // speckle
  for(let i=0;i<220;i++){
    const seed=(i*9301+49297)%233280;
    const rx=seed/233280;
    const t=(((i*37)+roadOffset*0.6)%1080)/1080;
    const y=roadY(t), half=roadHalf(t);
    const x=w*0.5+(rx*2-1)*half;
    const a=0.05+(1-t)*0.18;
    ctx2d.fillStyle=`rgba(255,255,255,${a})`;
    const s=0.6+(1-t)*1.6;
    ctx2d.fillRect(x,y,s,s);
  }

  // shoulders + dividers
  ctx2d.save(); ctx2d.strokeStyle=p.grid; ctx2d.shadowColor=p.glow; ctx2d.shadowBlur=14+bass*24; ctx2d.lineWidth=2;
  for(const side of [-1,1]){
    ctx2d.beginPath();
    for(let i=0;i<=40;i++){ const t=i/40,y=roadY(t),x=w*0.5+side*(roadHalf(t)-4);
      if(i===0) ctx2d.moveTo(x,y); else ctx2d.lineTo(x,y); }
    ctx2d.stroke();
  }
  ctx2d.globalAlpha=0.5; ctx2d.lineWidth=1;
  for(const off of [-0.5,0.5]){
    ctx2d.beginPath();
    for(let i=0;i<=40;i++){ const t=i/40,y=roadY(t),x=w*0.5+off*roadHalf(t);
      if(i===0) ctx2d.moveTo(x,y); else ctx2d.lineTo(x,y); }
    ctx2d.stroke();
  }
  ctx2d.restore();

  // center dashes
  ctx2d.save(); ctx2d.fillStyle="#fff"; ctx2d.shadowColor=p.glow; ctx2d.shadowBlur=10+bass*20;
  const dashes=14;
  for(let i=0;i<dashes;i++){
    const t=((i/dashes)+((roadOffset*0.0009)%1))%1;
    const tNext=Math.min(0.999,t+0.035);
    const y1=roadY(t), y2=roadY(tNext);
    const hw1=1+t*14, hw2=1+tNext*14, cx=w*0.5;
    ctx2d.globalAlpha=0.3+t*0.65;
    ctx2d.beginPath();
    ctx2d.moveTo(cx-hw1,y1); ctx2d.lineTo(cx+hw1,y1);
    ctx2d.lineTo(cx+hw2,y2); ctx2d.lineTo(cx-hw2,y2);
    ctx2d.closePath(); ctx2d.fill();
  }
  ctx2d.restore();

  // particles
  for(const pa of particles){
    pa.z -= 0.005+bass*0.04;
    if(pa.z<0.02){ pa.z=1; pa.x=(Math.random()-0.5)*2; }
    const px=w*0.5+(pa.x/pa.z)*w*0.4;
    const py=horizon+(1/pa.z)*(h-horizon)*0.3;
    if(py<h && py>horizon){
      const a=Math.min(1,0.3+treble*1.5);
      ctx2d.fillStyle=`rgba(255,255,255,${a})`;
      ctx2d.fillRect(px,py,(1/pa.z)*1.5,(1/pa.z)*1.5);
    }
  }

  // EQ
  if(analyser){
    const arr=new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteFrequencyData(arr);
    const bars=48, bw=(w*0.5)/bars;
    ctx2d.fillStyle=p.grid; ctx2d.shadowColor=p.glow; ctx2d.shadowBlur=8;
    for(let i=0;i<bars;i++){
      const v=arr[Math.floor((i/bars)*arr.length*0.6)]/255;
      ctx2d.fillRect(w*0.25+i*bw,30,bw-2,v*80);
    }
    ctx2d.shadowBlur=0;
  }

  // strobe
  if(strobe>0.5){ ctx2d.fillStyle=`rgba(255,255,255,${(strobe-0.5)*0.3})`; ctx2d.fillRect(0,0,w,h); }

  // POV hood
  const hoodBounce=beatPulse*6;
  const hoodTop=h*0.86+hoodBounce;
  ctx2d.save(); ctx2d.shadowColor=p.glow; ctx2d.shadowBlur=25+bass*40; ctx2d.fillStyle=p.car;
  ctx2d.beginPath();
  ctx2d.moveTo(-20,h+20); ctx2d.lineTo(-20,hoodTop+30);
  ctx2d.quadraticCurveTo(w*0.5,hoodTop-30,w+20,hoodTop+30);
  ctx2d.lineTo(w+20,h+20); ctx2d.closePath(); ctx2d.fill();
  ctx2d.restore();
  const gloss=ctx2d.createLinearGradient(0,hoodTop,0,hoodTop+40);
  gloss.addColorStop(0,"rgba(255,255,255,0.35)"); gloss.addColorStop(1,"rgba(255,255,255,0)");
  ctx2d.fillStyle=gloss;
  ctx2d.beginPath();
  ctx2d.moveTo(-20,hoodTop+30); ctx2d.quadraticCurveTo(w*0.5,hoodTop-30,w+20,hoodTop+30);
  ctx2d.lineTo(w+20,hoodTop+55); ctx2d.quadraticCurveTo(w*0.5,hoodTop-5,-20,hoodTop+55);
  ctx2d.closePath(); ctx2d.fill();
  ctx2d.strokeStyle="rgba(0,0,0,0.4)"; ctx2d.lineWidth=2;
  ctx2d.beginPath(); ctx2d.moveTo(w*0.5,hoodTop-20); ctx2d.lineTo(w*0.5,h); ctx2d.stroke();
  const lip=ctx2d.createLinearGradient(0,hoodTop-40,0,hoodTop+10);
  lip.addColorStop(0,"rgba(0,0,0,0)"); lip.addColorStop(1,"rgba(0,0,0,0.55)");
  ctx2d.fillStyle=lip;
  ctx2d.beginPath(); ctx2d.moveTo(0,hoodTop-40); ctx2d.lineTo(w,hoodTop-40);
  ctx2d.quadraticCurveTo(w*0.5,hoodTop-30,0,hoodTop+10); ctx2d.closePath(); ctx2d.fill();

  requestAnimationFrame(drawBg);
}
requestAnimationFrame(drawBg);

// ============ GAME ============
const gc = document.getElementById("gameCanvas");
const gctx = gc.getContext("2d");
let gW=0,gH=0;
function resizeGame(){
  const dpr=Math.min(window.devicePixelRatio||1,2);
  gW=gc.clientWidth; gH=gc.clientHeight;
  gc.width=gW*dpr; gc.height=gH*dpr;
  gctx.setTransform(dpr,0,0,dpr,0,0);
}
resizeGame();

const gstate = { carY:0.5, speed:4, obstacles:[], keys:{up:false,down:false,left:false,right:false}, elapsed:0, dead:false, score:0, spawnTimer:0 };
let highScore=0, isNewHigh=false;
try{ highScore = parseInt(localStorage.getItem("neonDriveHighScore")||"0",10)||0; }catch(e){}

function resetGame(){
  Object.assign(gstate,{carY:0.5,speed:4,obstacles:[],keys:{up:false,down:false,left:false,right:false},elapsed:0,dead:false,score:0,spawnTimer:0});
  isNewHigh=false;
  document.getElementById("over").classList.remove("on");
  document.getElementById("newRec").style.display="none";
}
function roundRect(c,x,y,w,h,r){
  c.beginPath(); c.moveTo(x+r,y);
  c.arcTo(x+w,y,x+w,y+h,r);
  c.arcTo(x+w,y+h,x,y+h,r);
  c.arcTo(x,y+h,x,y,r);
  c.arcTo(x,y,x+w,y,r);
  c.closePath();
}

window.addEventListener("keydown",e=>{
  const k=gstate.keys;
  if(e.key==="ArrowUp"||e.key==="w") k.up=true;
  if(e.key==="ArrowDown"||e.key==="s") k.down=true;
  if(e.key==="ArrowLeft"||e.key==="a") k.left=true;
  if(e.key==="ArrowRight"||e.key==="d") k.right=true;
  if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].includes(e.key)) e.preventDefault();
});
window.addEventListener("keyup",e=>{
  const k=gstate.keys;
  if(e.key==="ArrowUp"||e.key==="w") k.up=false;
  if(e.key==="ArrowDown"||e.key==="s") k.down=false;
  if(e.key==="ArrowLeft"||e.key==="a") k.left=false;
  if(e.key==="ArrowRight"||e.key==="d") k.right=false;
});
document.querySelectorAll(".touch").forEach(b=>{
  const k=b.dataset.k;
  const dn=e=>{e.preventDefault(); gstate.keys[k]=true;};
  const up=()=>{gstate.keys[k]=false;};
  b.addEventListener("pointerdown",dn);
  b.addEventListener("pointerup",up);
  b.addEventListener("pointerleave",up);
  b.addEventListener("pointercancel",up);
  b.addEventListener("contextmenu",e=>e.preventDefault());
});
document.getElementById("retry").addEventListener("click",resetGame);

let lastG=performance.now(), stripeOff=0;
function drawGame(time){
  const dt=Math.min(50,time-lastG); lastG=time;
  const s=gstate; const p=pal();
  const w=gW,h=gH;
  if(!gameMode){ requestAnimationFrame(drawGame); return; }
  gctx.clearRect(0,0,w,h);
  const roadTop=h*0.55, roadH=h*0.35, roadBottom=roadTop+roadH;

  gctx.fillStyle="rgba(0,0,0,0.78)"; gctx.fillRect(0,roadTop,w,roadH);
  gctx.strokeStyle=p.grid; gctx.shadowColor=p.glow; gctx.shadowBlur=14; gctx.lineWidth=3;
  gctx.beginPath(); gctx.moveTo(0,roadTop); gctx.lineTo(w,roadTop);
  gctx.moveTo(0,roadBottom); gctx.lineTo(w,roadBottom); gctx.stroke(); gctx.shadowBlur=0;

  stripeOff=(stripeOff+s.speed*dt*0.15)%40;
  gctx.fillStyle="#fff"; gctx.globalAlpha=0.7;
  for(let lane=1;lane<=2;lane++){
    const ly=roadTop+(roadH/3)*lane;
    for(let x=-stripeOff;x<w;x+=40) gctx.fillRect(x,ly-1.5,22,3);
  }
  gctx.globalAlpha=1;

  if(!s.dead){
    const mv=0.0012*dt;
    if(s.keys.up) s.carY -= mv*1.4;
    if(s.keys.down) s.carY += mv*1.4;
    s.carY = Math.max(0.08, Math.min(0.92, s.carY));
    if(s.keys.right) s.speed = Math.min(12, s.speed+0.02*dt);
    if(s.keys.left)  s.speed = Math.max(2,  s.speed-0.025*dt);
    else             s.speed = Math.max(4,  s.speed-0.005*dt);
    s.spawnTimer -= dt;
    if(s.spawnTimer<=0){
      s.spawnTimer = 500+Math.random()*700 - s.speed*30;
      const colors=[p.sun1,p.sun2,"#ff5050","#50ff90","#ffcc00"];
      s.obstacles.push({x:w+40,lane:Math.random(),w:36+Math.random()*18,h:18+Math.random()*10,color:colors[Math.floor(Math.random()*colors.length)]});
    }
    for(const o of s.obstacles) o.x -= s.speed*dt*0.25;
    s.obstacles = s.obstacles.filter(o=>o.x+o.w>-20);
    s.elapsed += dt;
    s.score = Math.floor(s.elapsed*0.01*s.speed);
  }

  for(const o of s.obstacles){
    const oy=roadTop+10+o.lane*(roadH-30);
    gctx.save(); gctx.shadowColor=o.color; gctx.shadowBlur=14; gctx.fillStyle=o.color;
    roundRect(gctx,o.x,oy,o.w,o.h,4); gctx.fill();
    gctx.fillStyle="rgba(0,0,0,0.5)"; gctx.fillRect(o.x+6,oy+4,o.w-12,o.h-8);
    gctx.restore();
  }

  const playerX=w*0.18, playerW=54, playerH=26;
  const playerY=roadTop+8+s.carY*(roadH-playerH-16);

  if(!s.dead){
    for(const o of s.obstacles){
      const oy=roadTop+10+o.lane*(roadH-30);
      if(playerX<o.x+o.w && playerX+playerW>o.x && playerY<oy+o.h && playerY+playerH>oy){
        s.dead=true;
        if(s.score>highScore){ highScore=s.score; isNewHigh=true; try{localStorage.setItem("neonDriveHighScore",String(s.score));}catch(e){} }
        document.getElementById("finalScore").textContent=s.score;
        document.getElementById("finalHi").textContent=highScore;
        document.getElementById("newRec").style.display=isNewHigh?"block":"none";
        const card=document.querySelector(".over .card");
        card.style.borderColor=p.car; card.style.boxShadow=`0 0 30px ${p.glow}`;
        document.querySelector(".over .ttl").style.color=p.car;
        document.querySelector(".over .ttl").style.textShadow=`0 0 8px ${p.glow}`;
        const r=document.getElementById("retry");
        r.style.borderColor=p.car; r.style.background=p.car; r.style.boxShadow=`0 0 12px ${p.glow}`;
        document.getElementById("over").classList.add("on");
      }
    }
  }

  gctx.fillStyle="rgba(0,0,0,0.45)";
  gctx.beginPath(); gctx.ellipse(playerX+playerW/2,playerY+playerH+4,playerW*0.55,4,0,0,Math.PI*2); gctx.fill();
  gctx.save(); gctx.shadowColor=p.glow; gctx.shadowBlur=18; gctx.fillStyle=p.car;
  roundRect(gctx,playerX,playerY,playerW,playerH,6); gctx.fill(); gctx.restore();
  gctx.fillStyle="rgba(0,0,0,0.55)"; roundRect(gctx,playerX+14,playerY+4,playerW-24,playerH-10,3); gctx.fill();
  gctx.fillStyle="#fff";
  gctx.fillRect(playerX+playerW-3,playerY+4,3,4);
  gctx.fillRect(playerX+playerW-3,playerY+playerH-8,3,4);
  gctx.fillStyle="#000";
  gctx.fillRect(playerX+4,playerY-2,10,4);
  gctx.fillRect(playerX+playerW-14,playerY-2,10,4);
  gctx.fillRect(playerX+4,playerY+playerH-2,10,4);
  gctx.fillRect(playerX+playerW-14,playerY+playerH-2,10,4);

  gctx.fillStyle=p.car; gctx.shadowColor=p.glow; gctx.shadowBlur=8;
  gctx.font="bold 14px monospace";
  gctx.fillText(`SCORE ${s.score}`,16,roadTop-16);
  gctx.fillText(`SPD ${s.speed.toFixed(1)}`,130,roadTop-16);
  gctx.fillStyle="#ffd84a"; gctx.shadowColor="#ffd84a";
  gctx.fillText(`★ HI ${Math.max(highScore,s.score)}`,220,roadTop-16);
  gctx.shadowBlur=0;

  const hud=document.getElementById("hud");
  hud.style.borderColor=p.car; hud.style.color=p.car; hud.style.textShadow=`0 0 6px ${p.glow}`;
  hud.textContent = (window.innerWidth<640) ? `score ${s.score}` : `↑↓ steer · ← brake · → accelerate · score ${s.score}`;

  requestAnimationFrame(drawGame);
}
requestAnimationFrame(drawGame);

// initial paint
renderUI();
</script>
</body>
</html>
