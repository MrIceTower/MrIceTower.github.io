<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Drive</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a001a;font-family:'Share Tech Mono',monospace;color:#fff;overflow:hidden;width:100vw;height:100vh;}

/* full-screen bg */
#bgCanvas{position:fixed;inset:0;width:100%;height:100%;z-index:0;}

/* EQ bar - top */
#eqWrap{position:fixed;top:0;left:0;right:0;z-index:20;height:130px;pointer-events:none;}
#eqTitle{position:absolute;top:8px;left:50%;transform:translateX(-50%);font-family:'Orbitron',sans-serif;font-size:11px;letter-spacing:6px;color:rgba(255,255,255,0.5);white-space:nowrap;}
#eqCanvas{position:absolute;top:0;left:0;width:100%;height:100%;}

/* PLAY GAME btn */
#playGameBtn{position:fixed;top:16px;right:20px;z-index:30;background:transparent;border:1.5px solid currentColor;font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;letter-spacing:3px;padding:9px 18px;cursor:pointer;clip-path:polygon(0 0,calc(100% - 8px) 0,100% 8px,100% 100%,8px 100%,0 calc(100% - 8px));transition:all 0.2s;}

/* BOOMBOX */
#boombox{position:fixed;bottom:28%;left:16px;z-index:20;width:300px;background:#0d0d1e;border:1.5px solid rgba(255,255,255,0.15);border-radius:8px;overflow:hidden;box-shadow:0 0 40px rgba(0,0,0,0.8);}
.bb-header{display:flex;justify-content:space-between;align-items:center;padding:6px 12px;background:#08081a;border-bottom:1px solid rgba(255,255,255,0.08);}
.bb-logo{font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:3px;opacity:0.8;}
.bb-pwr{display:flex;align-items:center;gap:5px;font-size:9px;letter-spacing:2px;opacity:0.6;}
.bb-pwr-dot{width:6px;height:6px;border-radius:50%;background:#00ff88;box-shadow:0 0 6px #00ff88;}
.bb-deck{display:grid;grid-template-columns:60px 1fr 60px;gap:8px;padding:10px 10px 8px;background:#0a0a1c;border-bottom:1px solid rgba(255,255,255,0.06);}
.bb-speaker{width:55px;height:55px;border-radius:50%;border:1.5px solid rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;background:radial-gradient(circle,#0d0d22 60%,#060614);position:relative;overflow:hidden;}
.bb-speaker::after{content:'';position:absolute;inset:6px;border-radius:50%;border:1px solid rgba(255,255,255,0.1);}
.bb-speaker-dot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,0.15);}
.bb-cassette{background:#060614;border:1px solid rgba(255,255,255,0.1);border-radius:4px;padding:6px 8px;display:flex;flex-direction:column;gap:4px;}
.bb-tape-transport{display:flex;align-items:center;justify-content:space-between;height:22px;}
.bb-reel{width:20px;height:20px;border-radius:50%;border:1.5px solid rgba(255,255,255,0.25);display:flex;align-items:center;justify-content:center;position:relative;}
.bb-reel::before{content:'';position:absolute;inset:4px;border-radius:50%;border:1px solid rgba(255,255,255,0.15);}
.bb-tape-head{flex:1;height:3px;margin:0 4px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.2),transparent);position:relative;}
.bb-tape-progress{height:100%;background:currentColor;width:35%;box-shadow:0 0 4px currentColor;}
.bb-track-info{font-size:9px;letter-spacing:1px;opacity:0.5;}
.bb-track-name{font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;}
.bb-track-meta{font-size:9px;opacity:0.5;letter-spacing:1px;margin-top:1px;}
.bb-vol-knob{width:44px;height:44px;border-radius:50%;border:1.5px solid rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;cursor:ns-resize;position:relative;margin:5px auto 0;background:radial-gradient(circle,#1a1a2e,#0a0a1c);}
.bb-vol-mark{position:absolute;width:2px;height:8px;background:currentColor;top:4px;left:50%;transform:translateX(-50%);border-radius:1px;transform-origin:50% 18px;box-shadow:0 0 4px currentColor;}
.bb-vol-label{font-size:8px;letter-spacing:1px;opacity:0.4;text-align:center;margin-top:2px;}
.bb-vu{padding:4px 10px 2px;border-bottom:1px solid rgba(255,255,255,0.05);}
#vuCanvas{width:100%;height:32px;display:block;}
.bb-transport{display:flex;align-items:center;gap:0;padding:6px 10px;border-bottom:1px solid rgba(255,255,255,0.05);}
.bb-btn{background:none;border:none;cursor:pointer;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:background 0.15s;font-size:14px;color:inherit;}
.bb-btn:hover{background:rgba(255,255,255,0.08);}
.bb-btn.play-pause{width:38px;height:38px;border:1.5px solid currentColor;box-shadow:0 0 10px rgba(255,255,255,0.1);}
.bb-vol-row{display:flex;align-items:center;gap:6px;margin-left:auto;}
.bb-vol-icon{font-size:12px;opacity:0.5;}
#volSlider{-webkit-appearance:none;appearance:none;width:70px;height:3px;background:rgba(255,255,255,0.15);border-radius:2px;outline:none;cursor:pointer;}
#volSlider::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:currentColor;box-shadow:0 0 6px currentColor;cursor:pointer;}
.bb-playlists{display:grid;grid-template-columns:repeat(4,1fr);border-top:1px solid rgba(255,255,255,0.06);}
.pl-tab{padding:8px 4px;text-align:center;cursor:pointer;font-size:9px;letter-spacing:1px;border-right:1px solid rgba(255,255,255,0.06);transition:all 0.2s;color:rgba(255,255,255,0.4);line-height:1.4;}
.pl-tab:last-child{border-right:none;}
.pl-tab:hover{color:rgba(255,255,255,0.7);background:rgba(255,255,255,0.04);}
.pl-tab.active{background:rgba(255,255,255,0.08);font-weight:700;color:#fff;}
.pl-tab .pl-num{font-family:'Orbitron',sans-serif;font-size:11px;}

/* GAME */
#gameOverlay{position:fixed;inset:0;z-index:50;display:none;background:transparent;flex-direction:column;}
#gameOverlay.on{display:flex;}
#gameHud{height:46px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0 20px;border-bottom:1px solid rgba(255,255,255,0.1);font-size:12px;letter-spacing:2px;}
#gameCanvas{flex:1;display:block;width:100%;}
#crashFlash{position:fixed;inset:0;z-index:55;background:#ff2d78;opacity:0;pointer-events:none;transition:opacity 0.06s;}
.scanlines{position:fixed;inset:0;z-index:40;pointer-events:none;background:repeating-linear-gradient(0deg,rgba(0,0,0,0.06) 0,rgba(0,0,0,0.06) 1px,transparent 1px,transparent 3px);}
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<div id="eqWrap">
<canvas id="eqCanvas"></canvas>
<div id="eqTitle">◀ NEON DRIVE ▶</div>
</div>

<button id="playGameBtn" onclick="startGame()">▶ PLAY GAME</button>

<!-- BOOMBOX -->
<div id="boombox">
<div class="bb-header">
<span class="bb-logo">◀ NEON-X ◀ STEREO</span>
<span class="bb-pwr"><span class="bb-pwr-dot" id="pwrDot"></span>PWR</span>
</div>
<div class="bb-deck">
<div style="display:flex;flex-direction:column;align-items:center;gap:4px;">
<div class="bb-speaker"><div class="bb-speaker-dot"></div></div>
</div>
<div class="bb-cassette">
<div class="bb-tape-transport">
<div class="bb-reel" id="reel1"></div>
<div class="bb-tape-head"><div class="bb-tape-progress" id="tapeProgress"></div></div>
<div class="bb-reel" id="reel2"></div>
</div>
<div class="bb-track-info" id="trackId">NEON://01 · SUN</div>
<div class="bb-track-name" id="trackName">♪ Midnight Cruise</div>
<div class="bb-track-meta" id="trackMeta">110 BPM · Ch-A</div>
</div>
<div style="display:flex;flex-direction:column;align-items:center;gap:2px;">
<div class="bb-speaker"><div class="bb-speaker-dot"></div></div>
<div class="bb-vol-knob" id="volKnob" title="Drag to change volume">
<div class="bb-vol-mark" id="volMark"></div>
</div>
<div class="bb-vol-label">VOL</div>
</div>
</div>
<div class="bb-vu">
<canvas id="vuCanvas" height="32"></canvas>
</div>
<div class="bb-transport">
<button class="bb-btn" onclick="prevTrack()" title="Previous">⏮</button>
<button class="bb-btn play-pause" id="playPauseBtn" onclick="togglePlay()">⏸</button>
<button class="bb-btn" onclick="nextTrack()" title="Next">⏭</button>
<div class="bb-vol-row">
<span class="bb-vol-icon">🔈</span>
<input type="range" id="volSlider" min="0" max="100" value="70" oninput="setVolume(this.value)">
</div>
</div>
<div class="bb-playlists">
<div class="pl-tab active" onclick="setPlaylist(0)"><div class="pl-num">01</div>SUN</div>
<div class="pl-tab" onclick="setPlaylist(1)"><div class="pl-num">02</div>MOON</div>
<div class="pl-tab" onclick="setPlaylist(2)"><div class="pl-num">03</div>BLACKHOLE</div>
<div class="pl-tab" onclick="setPlaylist(3)"><div class="pl-num">04</div>GALAXY</div>
</div>
</div>

<div class="scanlines"></div>

<!-- GAME -->
<div id="gameOverlay">
<div id="gameHud">
<span class="hud-score">SCORE <span id="scoreVal">0</span></span>
<span class="hud-ctrl" id="hudCtrl">↑ ACCELERATE • ↓ BRAKE • ← → STEER</span>
<span class="hud-hi">HI <span id="hiVal">0</span></span>
<button class="exit-btn" onclick="exitGame()">✕ EXIT</button>
</div>
<canvas id="gameCanvas"></canvas>
</div>

<script>
// =============================================
// PLAYLIST CONFIG - Täiustatud
// =============================================
const PLAYLISTS = [
  {name:'SUN', id:'01', trackName:'Midnight Cruise', bpm:110, ch:'Ch-A', accent:'#ff2d78', accentRGB:'255,45,120', gridColor:'#ff2d78', groundColor:'#ff006688',
    drawSky(ctx,W,H,t){ const g=ctx.createLinearGradient(0,0,0,H*0.65); g.addColorStop(0,'#0a001a');g.addColorStop(0.4,'#250025');g.addColorStop(0.75,'#550020');g.addColorStop(1,'#880030'); ctx.fillStyle=g;ctx.fillRect(0,0,W,H*0.65);
      const sx=W/2,sy=H*0.35; for(let i=0;i<32;i++){const a=i/32*Math.PI*2;ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(sx+Math.cos(a)*W*0.8,sy+Math.sin(a)*H*0.6);ctx.strokeStyle='rgba(255,120,40,0.07)';ctx.lineWidth=22;ctx.stroke();}
      const sg=ctx.createRadialGradient(sx,sy,0,sx,sy,W*0.28);sg.addColorStop(0,'rgba(255,220,80,0.9)');sg.addColorStop(0.6,'rgba(255,100,30,0.4)');sg.addColorStop(1,'transparent');ctx.fillStyle=sg;ctx.beginPath();ctx.arc(sx,sy,W*0.23,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#ffcc00';ctx.beginPath();ctx.arc(sx,sy,W*0.11,0,Math.PI*2);ctx.fill();
    }},
  {name:'MOON', id:'02', trackName:'Tokyo Rain', bpm:128, ch:'Ch-A', accent:'#00f5ff', accentRGB:'0,245,255', gridColor:'#00f5ff', groundColor:'#00f5ff66',
    drawSky(ctx,W,H,t){ const g=ctx.createLinearGradient(0,0,0,H*0.65); g.addColorStop(0,'#000a14');g.addColorStop(1,'#002040'); ctx.fillStyle=g;ctx.fillRect(0,0,W,H*0.65);
      const mx=W*0.58,my=H*0.32,mr=W*0.14; const mg=ctx.createRadialGradient(mx,my,0,mx,my,mr*3); mg.addColorStop(0,'rgba(100,240,255,0.25)');mg.addColorStop(1,'transparent'); ctx.fillStyle=mg;ctx.beginPath();ctx.arc(mx,my,mr*3,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#ddeeff';ctx.beginPath();ctx.arc(mx,my,mr,0,Math.PI*2);ctx.fill();
    }},
  {name:'BLACKHOLE', id:'03', trackName:'Event Horizon', bpm:145, ch:'Ch-A', accent:'#e0d0ff', accentRGB:'220,200,255', gridColor:'#ffffff', groundColor:'#ffffff33',
    drawSky(ctx,W,H,t){ ctx.fillStyle='#000';ctx.fillRect(0,0,W,H*0.65); const cx=W/2,cy=H*0.37; for(let ri=0;ri<6;ri++){ ctx.beginPath();ctx.ellipse(cx,cy+20,W*0.24+ri*12,W*0.08,0,0,Math.PI*2); ctx.strokeStyle=`rgba(200,120,255,${0.35-ri*0.05})`;ctx.lineWidth=18;ctx.stroke(); }
      ctx.fillStyle='#000';ctx.beginPath();ctx.arc(cx,cy,W*0.12,0,Math.PI*2);ctx.fill();
    }},
  {name:'GALAXY', id:'04', trackName:'Vapor Dream', bpm:96, ch:'Ch-A', accent:'#bf00ff', accentRGB:'180,100,255', gridColor:'#9955ff', groundColor:'#9955ff44',
    drawSky(ctx,W,H,t){ const g=ctx.createLinearGradient(0,0,0,H*0.65); g.addColorStop(0,'#06001a');g.addColorStop(1,'#1a0050'); ctx.fillStyle=g;ctx.fillRect(0,0,W,H*0.65);
      const gx=W/2,gy=H*0.33; for(let i=1;i<=16;i++){ const rr=W*(0.06+i*0.048); ctx.beginPath();ctx.ellipse(gx,gy,rr,rr*0.6, i*0.1,0,Math.PI*2); ctx.strokeStyle=`rgba(180,120,255,${0.32-i*0.018})`;ctx.lineWidth=2.2;ctx.stroke(); }
      const gc=ctx.createRadialGradient(gx,gy,0,gx,gy,W*0.16); gc.addColorStop(0,'#ffffff');gc.addColorStop(1,'transparent'); ctx.fillStyle=gc;ctx.beginPath();ctx.arc(gx,gy,W*0.1,0,Math.PI*2);ctx.fill();
    }}
];

let currentPl=0; let isPlaying=true; let volume=0.7; let beat=0; let bass=0; let roadOffset=0; let reelAngle=0; let highScore=0; let bgT=0;
let gameRunning=false, score=0, gSpeed=4.5, gFrame=0, gRoadOffset=0;
let playerLane=1, playerX=0, playerTargetX=0; let enemies=[]; let laneXArr=[];

const bgCanvas=document.getElementById('bgCanvas'); const bgCtx=bgCanvas.getContext('2d');
const gameCanvas=document.getElementById('gameCanvas'); const gCtx=gameCanvas.getContext('2d');

function resize(){ 
  bgCanvas.width=window.innerWidth; bgCanvas.height=window.innerHeight;
  gameCanvas.width=window.innerWidth; gameCanvas.height=window.innerHeight-46;
  const W=gameCanvas.width; const lw=W/3;
  laneXArr=[lw*0.5-25, lw*1.5-25, lw*2.5-25];
  playerX=playerTargetX=laneXArr[1];
}
window.addEventListener('resize',resize); resize();

// Background + Road
function drawBackground(){
  const W=bgCanvas.width, H=bgCanvas.height;
  bgCtx.clearRect(0,0,W,H);
  PLAYLISTS[currentPl].drawSky(bgCtx,W,H,bgT);
}

function drawGameCar(x,y,isPlayer){
  const pl=PLAYLISTS[currentPl];
  gCtx.save(); gCtx.translate(x,y);
  gCtx.shadowBlur=30; gCtx.shadowColor=isPlayer?pl.accent:'#ff3366';
  gCtx.fillStyle=isPlayer?pl.accent:'#ff3366'; gCtx.fillRect(-22,-38,44,76);
  gCtx.shadowBlur=0; gCtx.fillStyle='#0a0a1f'; gCtx.fillRect(-18,-32,36,64);
  gCtx.restore();
}

function gameLoop(){
  if(!gameRunning) return;
  gFrame++; gRoadOffset += gSpeed*1.8;
  if(gFrame%Math.floor(50/gSpeed*0.8)===0){ const lane=Math.floor(Math.random()*3); enemies.push({x:laneXArr[lane],y:-100,speed:gSpeed*0.7+Math.random()*1.5}); }
  playerX += (playerTargetX-playerX)*0.24;
  enemies.forEach(e=>e.y+=e.speed); enemies=enemies.filter(e=>e.y<gameCanvas.height+100);

  for(let e of enemies){ if(Math.abs(e.x-playerX)<38 && e.y>gameCanvas.height-170 && e.y<gameCanvas.height-55){ triggerCrash(); return; }}
  score=Math.floor(gFrame*0.23); document.getElementById('scoreVal').textContent=score;

  const W=gameCanvas.width, H=gameCanvas.height;
  gCtx.clearRect(0,0,W,H);
  drawBackground();

  // Road lines
  gCtx.strokeStyle=PLAYLISTS[currentPl].gridColor+'99';
  for(let i=-2;i<=2;i++){ const x=W/2 + i*(W*0.24); gCtx.beginPath(); gCtx.moveTo(x,H*0.58); gCtx.lineTo(x+i*85,H); gCtx.lineWidth=4.5; gCtx.stroke(); }
  for(let i=0;i<16;i++){ const y=((i*62 + gRoadOffset)%(H*0.65))+H*0.53; gCtx.fillStyle='#fff'; gCtx.fillRect(W/2-7,y,14,38); }

  enemies.forEach(e=>drawGameCar(e.x,e.y,false));
  drawGameCar(playerX,H-148,true);

  requestAnimationFrame(gameLoop);
}

function triggerCrash(){
  gameRunning=false;
  if(score>highScore) highScore=score;
  alert(`GAME OVER\n\nScore: ${score}\nHigh Score: ${highScore}`);
  exitGame();
}

function startGame(){
  document.getElementById('gameOverlay').classList.add('on');
  resize(); score=0; gFrame=0; gSpeed=4.5; enemies=[];
  gameRunning=true; requestAnimationFrame(gameLoop);
}

function exitGame(){
  gameRunning=false; document.getElementById('gameOverlay').classList.remove('on');
}

document.addEventListener('keydown',e=>{
  if(!gameRunning) return;
  if(e.key==='ArrowLeft'){playerLane=Math.max(0,playerLane-1); playerTargetX=laneXArr[playerLane];}
  if(e.key==='ArrowRight'){playerLane=Math.min(2,playerLane+1); playerTargetX=laneXArr[playerLane];}
  if(e.key==='ArrowUp') gSpeed=Math.min(9.5,gSpeed+0.7);
  if(e.key==='ArrowDown') gSpeed=Math.max(2.8,gSpeed-0.7);
});

// Playlist functions
function setPlaylist(i){ currentPl=i; document.querySelectorAll('.pl-tab').forEach((t,idx)=>t.classList.toggle('active',idx===i)); }
function prevTrack(){ setPlaylist((currentPl+3)%4); }
function nextTrack(){ setPlaylist((currentPl+1)%4); }
function togglePlay(){ isPlaying=!isPlaying; document.getElementById('playPauseBtn').textContent=isPlaying?'⏸':'▶'; }
function setVolume(v){ volume=v/100; }

// Init
setPlaylist(0);
</script>
</body>
</html>
