<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>90s Retro Equalizer Drive</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      height: 100vh;
      overflow: hidden;
      background: linear-gradient(to bottom, #0a0022, #1a0033, #000);
      position: relative;
      font-family: 'Courier New', monospace;
    }

    /* Background Color Shift - 90s Neon */
    body::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(135deg, #00ffff, #ff00ff, #ffff00, #00ff00);
      opacity: 0.15;
      animation: bgShift 15s infinite linear;
      z-index: 1;
    }

    @keyframes bgShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Huge Background Equalizer */
    .equalizer {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 65%;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 12px;
      padding-bottom: 80px;
      z-index: 2;
      filter: blur(1px);
    }

    .bar {
      width: 28px;
      background: linear-gradient(to top, #ff00ff, #00ffff, #ffff00);
      border-radius: 8px 8px 0 0;
      box-shadow: 0 0 25px #ff00ff,
                  0 0 45px #00ffff;
      animation: barMove 0.4s infinite alternate ease-in-out;
    }

    .bar:nth-child(1) { height: 45%; animation-delay: 0ms; }
    .bar:nth-child(2) { height: 65%; animation-delay: 80ms; }
    .bar:nth-child(3) { height: 35%; animation-delay: 150ms; }
    .bar:nth-child(4) { height: 80%; animation-delay: 40ms; }
    .bar:nth-child(5) { height: 55%; animation-delay: 200ms; }
    .bar:nth-child(6) { height: 70%; animation-delay: 90ms; }
    .bar:nth-child(7) { height: 40%; animation-delay: 130ms; }
    .bar:nth-child(8) { height: 75%; animation-delay: 60ms; }
    .bar:nth-child(9) { height: 50%; animation-delay: 170ms; }

    @keyframes barMove {
      from { height: 30%; }
      to   { height: 95%; }
    }

    /* Road */
    .road {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 45%;
      background: linear-gradient(to bottom, transparent, #111);
      z-index: 3;
      perspective: 800px;
    }

    .road::before {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      width: 120%;
      height: 100%;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 40px,
        #ff00ff 40px,
        #ff00ff 45px
      );
      transform: rotateX(75deg) scale(1.5);
      animation: roadMove 1.8s linear infinite;
      opacity: 0.7;
    }

    @keyframes roadMove {
      from { background-position-y: 0; }
      to   { background-position-y: 200px; }
    }

    /* Subaru Car */
    .car {
      position: absolute;
      bottom: 18%;
      left: 45%;
      font-size: 90px;
      z-index: 5;
      animation: driveForward 8s linear infinite;
      filter: drop-shadow(0 0 20px #00ffff);
    }

    @keyframes driveForward {
      0%   { transform: translateX(-120px) scale(0.7); }
      100% { transform: translateX(180px) scale(1.1); }
    }

    /* Overlay glow */
    .overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: radial-gradient(circle at center, transparent 40%, rgba(10, 0, 40, 0.6));
      z-index: 4;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <!-- Background Equalizer -->
  <div class="equalizer">
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
  </div>

  <!-- Road -->
  <div class="road"></div>

  <!-- Car -->
  <div class="car">🚗</div>

  <div class="overlay"></div>

</body>
</html>
