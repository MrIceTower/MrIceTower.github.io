<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neon Drive — Music-Reactive Endless Road</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      height: 100vh;
      overflow: hidden;
      background: #0a001f;
      color: white;
      font-family: 'Press Start 2P', system-ui;
      position: relative;
    }

    /* Background color shift */
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #00ffff, #ff00ff, #ffff00, #ff0080);
      opacity: 0.12;
      animation: bgShift 15s infinite linear;
      z-index: 1;
    }

    @keyframes bgShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .title {
      position: absolute;
      top: 12%;
      left: 50%;
      transform: translateX(-50%);
      font-size: 4.5rem;
      letter-spacing: 12px;
      text-align: center;
      z-index: 10;
      text-shadow: 
        0 0 20px #ff00ff,
        0 0 40px #00ffff,
        0 0 60px #ffff00;
      pointer-events: none;
    }

    .subtitle {
      font-size: 1rem;
      letter-spacing: 6px;
      opacity: 0.9;
      margin-top: 15px;
    }

    /* Equalizer */
    .equalizer {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 70%;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 22px;
      padding-bottom: 120px;
      z-index: 2;
    }

    .bar {
      width: 45px;
      background: linear-gradient(to top, #ff00ff, #00ffff, #ffff00);
      border-radius: 8px 8px 0 0;
      box-shadow: 0 0 25px #ff00ff,
                  0 0 50px #00ffff;
      transition: height 0.05s linear;
    }

    /* Road */
    .road {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 52%;
      background: linear-gradient(to bottom, transparent, #05050f);
      z-index: 3;
    }

    .road::before {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      width: 180%;
      height: 100%;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 34px,
        #ff00ff 34px,
        #ff00ff 40px
      );
      transform: rotateX(68deg) scale(1.8);
      animation: roadMove 1.2s linear infinite;
      opacity: 0.85;
    }

    @keyframes roadMove {
      from { background-position-y: 0; }
      to { background-position-y: 300px; }
    }

    /* Side markers */
    .side-markers {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 52%;
      z-index: 4;
      background: repeating-linear-gradient(
        90deg,
        transparent 0px,
        transparent 90px,
        rgba(0, 255, 255, 0.15) 92px,
        rgba(0, 255, 255, 0.15) 98px
      );
      animation: markersMove 1.2s linear infinite;
    }

    @keyframes markersMove {
      from { background-position-x: 0; }
      to { background-position-x: -180px; }
    }

    /* Car */
    .car {
      position: absolute;
      bottom: 19%;
      left: 50%;
      transform: translateX(-50%);
      width: 230px;
      z-index: 5;
      filter: drop-shadow(0 20px 35px #ff00ff);
      animation: carIdle 0.9s infinite alternate ease-in-out;
    }

    @keyframes carIdle {
      from { transform: translateX(-50%) translateY(0); }
      to { transform: translateX(-50%) translateY(-6px); }
    }

    .wheel {
      animation: spin 0.28s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* Play Button */
    .play-btn {
      position: absolute;
      top: 55%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 20px 50px;
      font-size: 1.4rem;
      font-family: 'Press Start 2P', system-ui;
      background: transparent;
      color: #fff;
      border: 4px solid #00ffff;
      cursor: pointer;
      z-index: 20;
      text-shadow: 0 0 15px #00ffff;
      box-shadow: 0 0 30px #ff00ff;
      transition: all 0.2s;
    }

    .play-btn:hover {
      background: rgba(255, 0, 255, 0.2);
      transform: translate(-50%, -50%) scale(1.05);
    }

    .hidden { display: none; }
  </style>
</head>
<body>

  <h1 class="title">
    ▮ NEON DRIVE ▮
    <div class="subtitle">ENDLESS ROAD</div>
  </h1>

  <!-- Equalizer -->
  <div class="equalizer" id="equalizer">
    <div class="bar" style="height: 35%"></div>
    <div class="bar" style="height: 65%"></div>
    <div class="bar" style="height: 42%"></div>
    <div class="bar" style="height: 88%"></div>
    <div class="bar" style="height: 55%"></div>
    <div class="bar" style="height: 78%"></div>
    <div class="bar" style="height: 48%"></div>
    <div class="bar" style="height: 82%"></div>
    <div class="bar" style="height: 60%"></div>
    <div class="bar" style="height: 45%"></div>
  </div>

  <!-- Road -->
  <div class="road"></div>
  <div class="side-markers"></div>

  <!-- Car -->
  <svg class="car" viewBox="0 0 270 120" xmlns="http://www.w3.org/2000/svg">
    <!-- Body -->
    <path d="M25 72 Q25 48 55 42 Q115 28 200 38 Q235 48 245 72 Q245 90 220 96 L50 96 Q30 90 25 72" fill="#3a0f3a" stroke="#00ffff" stroke-width="16"/>
    <!-- Window -->
    <path d="M68 52 Q90 40 135 40 Q175 42 190 56 L180 70 L78 70 Z" fill="#0a1428" stroke="#00ffff" stroke-width="8"/>
    <!-- Lights -->
    <rect x="228" y="66" width="22" height="18" rx="4" fill="#ffee44"/>
    <rect x="22" y="70" width="18" height="20" rx="3" fill="#ff0066"/>
    <!-- Bumper -->
    <rect x="32" y="75" width="55" height="14" rx="4" fill="#1a1a2a"/>
    <!-- Wheels -->
    <g class="wheel">
      <circle cx="80" cy="96" r="24" fill="#111" stroke="#00ffff" stroke-width="14"/>
      <circle cx="80" cy="96" r="13" fill="#222"/>
    </g>
    <g class="wheel">
      <circle cx="185" cy="96" r="24" fill="#111" stroke="#00ffff" stroke-width="14"/>
      <circle cx="185" cy="96" r="13" fill="#222"/>
    </g>
    <!-- Spoiler -->
    <rect x="190" y="38" width="55" height="11" rx="3" fill="#ff00aa"/>
  </svg>

  <!-- Play Button -->
  <button class="play-btn" id="playBtn">▶ PRESS TO START THE DRIVE</button>

  <audio id="music" loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
  </audio>

  <script>
    const bars = document.querySelectorAll('.bar');
    const playBtn = document.getElementById('playBtn');
    const audio = document.getElementById('music');
    let audioCtx, analyser, source, dataArray;

    function initAudio() {
      if (audioCtx) return;
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      analyser = audioCtx.createAnalyser();
      source = audioCtx.createMediaElementSource(audio);
      source.connect(analyser);
      analyser.connect(audioCtx.destination);
      analyser.fftSize = 64;
      dataArray = new Uint8Array(analyser.frequencyBinCount);
    }

    function animateEqualizer() {
      if (!analyser) return;
      analyser.getByteFrequencyData(dataArray);

      bars.forEach((bar, i) => {
        const value = dataArray[i * 3] || 30;
        const height = Math.max(25, (value / 255) * 95);
        bar.style.height = `${height}%`;
      });

      requestAnimationFrame(animateEqualizer);
    }

    playBtn.addEventListener('click', () => {
      initAudio();
      audio.play();
      playBtn.classList.add('hidden');
      animateEqualizer();
    });
  </script>
</body>
</html>
