<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Drive</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#0a001a;
  font-family:'Share Tech Mono', monospace;
  color:#fff;
  overflow:hidden;
  width:100vw;
  height:100vh;
}

#bgCanvas { position:fixed; inset:0; width:100%; height:100%; z-index:0; }

#eqWrap {
  position:fixed; top:0; left:0; right:0; z-index:20;
  height:130px; pointer-events:none;
}
#eqTitle {
  position:absolute; top:8px; left:50%; transform:translateX(-50%);
  font-family:'Orbitron', sans-serif; font-size:11px; letter-spacing:6px;
  color:rgba(255,255,255,0.5);
}
#eqCanvas { position:absolute; top:0; left:0; width:100%; height:100%; }

#playGameBtn {
  position:fixed; top:16px; right:20px; z-index:30;
  background:transparent; border:1.5px solid currentColor;
  font-family:'Orbitron', sans-serif; font-size:11px; font-weight:700;
  letter-spacing:3px; padding:9px 18px; cursor:pointer;
  clip-path:polygon(0 0,calc(100% - 8px) 0,100% 8px,100% 100%,8px 100%,0 calc(100% - 8px));
  transition:all 0.2s;
}

#boombox {
  position:fixed; bottom:28%; left:16px; z-index:20;
  width:300px; background:#0d0d1e;
  border:1.5px solid rgba(255,255,255,0.15);
  border-radius:8px; overflow:hidden;
  box-shadow:0 0 40px rgba(0,0,0,0.8);
}

/* (Keeping all your original boombox styles - abbreviated for space) */
.bb-header, .bb-deck, .bb-vu, .bb-transport, .bb-playlists { /* ... your original styles ... */ }
.pl-tab.active { background:rgba(255,255,255,0.08); font-weight:700; }

/* GAME */
#gameOverlay {
  position:fixed; inset:0; z-index:50; display:none; flex-direction:column;
  background:transparent;
}
#gameOverlay.on { display:flex; }

#gameHud {
  height:46px; flex-shrink:0; display:flex; align-items:center; justify-content:space-between;
  padding:0 20px; border-bottom:1px solid rgba(255,255,255,0.1);
  font-size:12px; letter-spacing:2px; z-index:10;
}
#gameCanvas { flex:1; display:block; width:100%; }

.scanlines {
  position:fixed; inset:0; z-index:40; pointer-events:none;
  background:repeating-linear-gradient(0deg,rgba(0,0,0,0.06) 0,rgba(0,0,0,0.06) 1px,transparent 1px,transparent 3px);
}
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<div id="eqWrap">
  <canvas id="eqCanvas"></canvas>
  <div id="eqTitle">◀ NEON DRIVE ▶</div>
</div>

<button id="playGameBtn" onclick="startGame()">▶ PLAY GAME</button>

<!-- BOOMBOX (your original HTML kept) -->
<div id="boombox">
  <!-- ... [Your full boombox HTML from previous code] ... -->
  <div class="bb-header">
    <span class="bb-logo">◀ NEON-X ◀ STEREO</span>
    <span class="bb-pwr"><span class="bb-pwr-dot" id="pwrDot"></span>PWR</span>
  </div>
  <div class="bb-deck">
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px;">
      <div class="bb-speaker"><div class="bb-speaker-dot"></div></div>
    </div>
    <div class="bb-cassette">
      <div class="bb-tape-transport">
        <div class="bb-reel" id="reel1"></div>
        <div class="bb-tape-head"><div class="bb-tape-progress" id="tapeProgress"></div></div>
        <div class="bb-reel" id="reel2"></div>
      </div>
      <div class="bb-track-info" id="trackId">NEON://01 · SUN</div>
      <div class="bb-track-name" id="trackName">♪ Midnight Cruise</div>
      <div class="bb-track-meta" id="trackMeta">110 BPM · Ch-A</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:2px;">
      <div class="bb-speaker"><div class="bb-speaker-dot"></div></div>
      <div class="bb-vol-knob" id="volKnob"><div class="bb-vol-mark" id="volMark"></div></div>
      <div class="bb-vol-label">VOL</div>
    </div>
  </div>
  <div class="bb-vu"><canvas id="vuCanvas" height="32"></canvas></div>
  <div class="bb-transport">
    <button class="bb-btn" onclick="prevTrack()">⏮</button>
    <button class="bb-btn play-pause" id="playPauseBtn" onclick="togglePlay()">⏸</button>
    <button class="bb-btn" onclick="nextTrack()">⏭</button>
    <div class="bb-vol-row">
      <span class="bb-vol-icon">🔈</span>
      <input type="range" id="volSlider" min="0" max="100" value="70" oninput="setVolume(this.value)">
    </div>
  </div>
  <div class="bb-playlists">
    <div class="pl-tab active" onclick="setPlaylist(0)"><div class="pl-num">01</div>SUN</div>
    <div class="pl-tab" onclick="setPlaylist(1)"><div class="pl-num">02</div>MOON</div>
    <div class="pl-tab" onclick="setPlaylist(2)"><div class="pl-num">03</div>BLACKHOLE</div>
    <div class="pl-tab" onclick="setPlaylist(3)"><div class="pl-num">04</div>GALAXY</div>
  </div>
</div>

<div class="scanlines"></div>

<!-- GAME -->
<div id="gameOverlay">
  <div id="gameHud">
    <span class="hud-score">SCORE <span id="scoreVal" style="color:#bf00ff">0</span></span>
    <span class="hud-ctrl" id="hudCtrl">↑ ACCEL • ↓ BRAKE • ← → STEER</span>
    <span class="hud-hi">HI <span id="hiVal">0</span></span>
    <button class="exit-btn" onclick="exitGame()">✕ EXIT</button>
  </div>
  <canvas id="gameCanvas"></canvas>
</div>

<script>
// ==================== PLAYLISTS WITH BETTER BACKGROUNDS ====================
const PLAYLISTS = [
  { name:'SUN', id:'01', trackName:'Midnight Cruise', bpm:110,
    accent:'#ff2d78', accentRGB:'255,45,120', gridColor:'#ff2d78',
    drawSky(ctx,W,H){
      const grad = ctx.createLinearGradient(0,0,0,H*0.65);
      grad.addColorStop(0,'#0a001a'); grad.addColorStop(0.45,'#30001a'); grad.addColorStop(1,'#880030');
      ctx.fillStyle = grad; ctx.fillRect(0,0,W,H*0.65);

      const sx = W/2, sy = H*0.36;
      for(let i=0; i<36; i++){
        const a = i/36*Math.PI*2;
        ctx.beginPath(); ctx.moveTo(sx,sy);
        ctx.lineTo(sx+Math.cos(a)*W*0.75, sy+Math.sin(a)*H*0.55);
        ctx.strokeStyle = 'rgba(255,140,60,0.07)'; ctx.lineWidth = 24; ctx.stroke();
      }
      const sunG = ctx.createRadialGradient(sx,sy,0,sx,sy,W*0.29);
      sunG.addColorStop(0,'#ffff88'); sunG.addColorStop(0.5,'#ffaa00'); sunG.addColorStop(1,'transparent');
      ctx.fillStyle = sunG; ctx.beginPath(); ctx.arc(sx,sy,W*0.23,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = '#ffcc00'; ctx.beginPath(); ctx.arc(sx,sy,W*0.11,0,Math.PI*2); ctx.fill();
    }
  },
  { name:'MOON', id:'02', trackName:'Tokyo Rain', bpm:128,
    accent:'#00f5ff', accentRGB:'0,245,255', gridColor:'#00f5ff',
    drawSky(ctx,W,H){
      const grad = ctx.createLinearGradient(0,0,0,H*0.65);
      grad.addColorStop(0,'#000a14'); grad.addColorStop(1,'#002040');
      ctx.fillStyle = grad; ctx.fillRect(0,0,W,H*0.65);

      const mx = W*0.6, my = H*0.32, mr = W*0.145;
      const glow = ctx.createRadialGradient(mx,my,0,mx,my,mr*3.2);
      glow.addColorStop(0,'rgba(100,240,255,0.3)'); glow.addColorStop(1,'transparent');
      ctx.fillStyle = glow; ctx.beginPath(); ctx.arc(mx,my,mr*3.2,0,Math.PI*2); ctx.fill();

      ctx.fillStyle = '#ddeeff'; ctx.beginPath(); ctx.arc(mx,my,mr,0,Math.PI*2); ctx.fill();
    }
  },
  { name:'BLACKHOLE', id:'03', trackName:'Event Horizon', bpm:145,
    accent:'#e0d0ff', accentRGB:'220,200,255', gridColor:'#ffffff',
    drawSky(ctx,W,H){
      ctx.fillStyle = '#000'; ctx.fillRect(0,0,W,H*0.65);
      const cx = W/2, cy = H*0.37;
      for(let i=6; i>0; i--){
        ctx.beginPath();
        ctx.ellipse(cx, cy+15, W*0.24+i*14, W*0.08, 0, 0, Math.PI*2);
        ctx.strokeStyle = `rgba(200,120,255,${0.35-i*0.05})`;
        ctx.lineWidth = 22; ctx.stroke();
      }
      ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(cx,cy,W*0.115,0,Math.PI*2); ctx.fill();
    }
  },
  { name:'GALAXY', id:'04', trackName:'Vapor Dream', bpm:96,
    accent:'#bf00ff', accentRGB:'180,100,255', gridColor:'#9955ff',
    drawSky(ctx,W,H){
      const grad = ctx.createLinearGradient(0,0,0,H*0.65);
      grad.addColorStop(0,'#06001a'); grad.addColorStop(1,'#1a0050');
      ctx.fillStyle = grad; ctx.fillRect(0,0,W,H*0.65);

      const cx = W/2, cy = H*0.33;
      for(let i=1; i<=16; i++){
        ctx.beginPath();
        ctx.ellipse(cx, cy, W*(0.06+i*0.048), W*(0.035+i*0.029), i*0.08, 0, Math.PI*2);
        ctx.strokeStyle = `rgba(180,120,255,${0.32-i*0.018})`;
        ctx.lineWidth = 2.2; ctx.stroke();
      }
      const core = ctx.createRadialGradient(cx,cy,0,cx,cy,W*0.16);
      core.addColorStop(0,'#ffffff'); core.addColorStop(0.6,'#cc88ff'); core.addColorStop(1,'transparent');
      ctx.fillStyle = core; ctx.beginPath(); ctx.arc(cx,cy,W*0.095,0,Math.PI*2); ctx.fill();
    }
  }
];

// ==================== GAME LOGIC ====================
let currentPl = 0;
let isPlaying = true;
let highScore = 0;
let bgT = 0;

// Game variables
let gameRunning = false;
let score = 0, gFrame = 0, gSpeed = 4.5, gRoadOffset = 0;
let playerLane = 1, playerX = 0, playerTargetX = 0;
let enemies = [];
let laneXArr = [];

const bgCanvas = document.getElementById('bgCanvas');
const bgCtx = bgCanvas.getContext('2d');
const gameCanvas = document.getElementById('gameCanvas');
const gCtx = gameCanvas.getContext('2d');

function resizeAll(){
  bgCanvas.width = window.innerWidth;
  bgCanvas.height = window.innerHeight;
  gameCanvas.width = window.innerWidth;
  gameCanvas.height = window.innerHeight - 46;
  
  const W = gameCanvas.width;
  const laneW = W / 3;
  laneXArr = [laneW*0.5-25, laneW*1.5-25, laneW*2.5-25];
  playerX = playerTargetX = laneXArr[1];
}
window.addEventListener('resize', resizeAll);
resizeAll();

// Background animation
function drawBackground(){
  const W = bgCanvas.width, H = bgCanvas.height;
  bgCtx.clearRect(0,0,W,H);
  PLAYLISTS[currentPl].drawSky(bgCtx, W, H);
  // Road
  const roadY = H * 0.58;
  bgCtx.fillStyle = '#0a0a1a';
  bgCtx.fillRect(0, roadY, W, H-roadY);
}

// Simple car drawer
function drawCar(x, y, isPlayer){
  const pl = PLAYLISTS[currentPl];
  gCtx.save();
  gCtx.translate(x, y);

  // Glow
  gCtx.shadowBlur = 25;
  gCtx.shadowColor = isPlayer ? pl.accent : '#ff3366';
  gCtx.fillStyle = isPlayer ? pl.accent : '#ff3366';
  gCtx.fillRect(-22, -35, 44, 70);

  // Body
  gCtx.shadowBlur = 0;
  gCtx.fillStyle = isPlayer ? '#0a0a1f' : '#1a1a2f';
  gCtx.fillRect(-18, -30, 36, 60);

  // Neon lines
  gCtx.strokeStyle = isPlayer ? pl.accent : '#ff88aa';
  gCtx.lineWidth = 3;
  gCtx.beginPath();
  gCtx.moveTo(-15, -20); gCtx.lineTo(15, -20);
  gCtx.stroke();

  gCtx.restore();
}

function gameLoop(){
  if(!gameRunning) return;
  gFrame++;
  gRoadOffset += gSpeed * 1.6;

  // Spawn
  if(gFrame % Math.max(35, Math.floor(70/gSpeed)) === 0){
    const lane = Math.floor(Math.random()*3);
    enemies.push({x: laneXArr[lane], y: -80, speed: gSpeed*0.75 + Math.random()*1.8});
  }

  // Update
  playerX += (playerTargetX - playerX) * 0.25;
  enemies.forEach(e => e.y += e.speed);
  enemies = enemies.filter(e => e.y < gameCanvas.height + 100);

  // Collision
  for(let e of enemies){
    if(Math.abs(e.x - playerX) < 38 && e.y > gameCanvas.height-170 && e.y < gameCanvas.height-50){
      triggerCrash();
      return;
    }
  }

  score = Math.floor(gFrame * 0.22);
  document.getElementById('scoreVal').textContent = score;

  // Draw
  const W = gameCanvas.width, H = gameCanvas.height;
  gCtx.clearRect(0,0,W,H);

  // Draw background sky + road
  drawBackground();

  // Draw road lines on game canvas
  gCtx.strokeStyle = PLAYLISTS[currentPl].gridColor + '99';
  for(let i = -2; i <= 2; i++){
    const x = W/2 + i*(W*0.22);
    gCtx.beginPath();
    gCtx.moveTo(x, H*0.58);
    gCtx.lineTo(x + i*90, H);
    gCtx.lineWidth = 4;
    gCtx.stroke();
  }

  // Center dashes
  for(let i = 0; i < 15; i++){
    const y = ((i*65 + gRoadOffset) % (H*0.7)) + H*0.55;
    gCtx.fillStyle = '#ffffff';
    gCtx.fillRect(W/2 - 8, y, 16, 35);
  }

  // Draw cars
  enemies.forEach(e => drawCar(e.x, e.y, false));
  drawCar(playerX, H-145, true);

  requestAnimationFrame(gameLoop);
}

function triggerCrash(){
  gameRunning = false;
  if(score > highScore) highScore = score;
  document.getElementById('hiVal').textContent = highScore;
  alert(`GAME OVER\nScore: ${score}\nHigh Score: ${highScore}`);
  exitGame();
}

function startGame(){
  document.getElementById('gameOverlay').classList.add('on');
  resizeAll();
  score = 0; gFrame = 0; gSpeed = 4.5; enemies = [];
  playerLane = 1; playerX = playerTargetX = laneXArr[1];
  gameRunning = true;
  requestAnimationFrame(gameLoop);
}

function exitGame(){
  gameRunning = false;
  document.getElementById('gameOverlay').classList.remove('on');
}

// Keyboard controls
document.addEventListener('keydown', e => {
  if(!gameRunning) return;
  if(e.key === 'ArrowLeft') { playerLane = Math.max(0, playerLane-1); playerTargetX = laneXArr[playerLane]; }
  if(e.key === 'ArrowRight') { playerLane = Math.min(2, playerLane+1); playerTargetX = laneXArr[playerLane]; }
  if(e.key === 'ArrowUp') gSpeed = Math.min(9, gSpeed + 0.6);
  if(e.key === 'ArrowDown') gSpeed = Math.max(2.5, gSpeed - 0.6);
});

// Playlist functions (same as before)
function setPlaylist(i){ currentPl = i; /* update UI */ }
function prevTrack(){ setPlaylist((currentPl+3)%4); }
function nextTrack(){ setPlaylist((currentPl+1)%4); }
function togglePlay(){ isPlaying = !isPlaying; }

// Initialize
setPlaylist(0);
</script>
</body>
</html>
