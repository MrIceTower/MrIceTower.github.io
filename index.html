<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>90s Retro Equalizer Drive</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      height: 100vh;
      overflow: hidden;
      background: linear-gradient(to bottom, #0a0022, #1a0033, #000);
      position: relative;
    }

    /* Smooth 90s Neon Background Shift - every 15s */
    body::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(135deg, #00ffff, #ff00ff, #ffff00, #ff0080, #00ffcc);
      opacity: 0.18;
      animation: bgShift 15s infinite linear;
      z-index: 1;
    }

    @keyframes bgShift {
      0%   { background-position: 0% 50%; filter: hue-rotate(0deg); }
      25%  { background-position: 50% 50%; filter: hue-rotate(70deg); }
      50%  { background-position: 100% 50%; filter: hue-rotate(140deg); }
      75%  { background-position: 50% 50%; filter: hue-rotate(200deg); }
      100% { background-position: 0% 50%; filter: hue-rotate(0deg); }
    }

    /* MUCH BIGGER Background Equalizer */
    .equalizer {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 72%;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 18px;
      padding-bottom: 100px;
      z-index: 2;
    }

    .bar {
      width: 38px;
      background: linear-gradient(to top, #ff00ff, #00ffff, #ffff00, #ff0080);
      border-radius: 12px 12px 0 0;
      box-shadow: 0 0 35px #ff00ff,
                  0 0 65px #00ffff,
                  0 0 90px #ffff00;
      animation: barMove 0.32s infinite alternate ease-in-out;
    }

    .bar:nth-child(1) { height: 38%; animation-delay: 0ms; }
    .bar:nth-child(2) { height: 72%; animation-delay: 60ms; }
    .bar:nth-child(3) { height: 42%; animation-delay: 130ms; }
    .bar:nth-child(4) { height: 88%; animation-delay: 20ms; }
    .bar:nth-child(5) { height: 55%; animation-delay: 180ms; }
    .bar:nth-child(6) { height: 78%; animation-delay: 70ms; }
    .bar:nth-child(7) { height: 48%; animation-delay: 110ms; }
    .bar:nth-child(8) { height: 82%; animation-delay: 40ms; }
    .bar:nth-child(9) { height: 65%; animation-delay: 150ms; }
    .bar:nth-child(10){ height: 52%; animation-delay: 90ms; }

    @keyframes barMove {
      from { height: 25%; }
      to   { height: 98%; }
    }

    /* Road */
    .road {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 48%;
      background: linear-gradient(to bottom, transparent, #0f0f1f);
      z-index: 3;
      perspective: 900px;
    }

    .road::before {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      width: 140%;
      height: 100%;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 38px,
        #ff00ff 38px,
        #ff00ff 44px
      );
      transform: rotateX(72deg) scale(1.6);
      animation: roadMove 1.4s linear infinite;
      opacity: 0.75;
    }

    @keyframes roadMove {
      from { background-position-y: 0; }
      to   { background-position-y: 250px; }
    }

    /* Side road details (90s retro) */
    .road-details {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 48%;
      z-index: 4;
      background: 
        linear-gradient(90deg, transparent 20%, rgba(255,0,255,0.08) 22%, transparent 24%),
        linear-gradient(90deg, transparent 75%, rgba(0,255,255,0.08) 77%, transparent 79%);
      background-size: 140px 100%;
      animation: detailsMove 1.4s linear infinite;
      opacity: 0.6;
    }

    @keyframes detailsMove {
      from { background-position-x: 0; }
      to   { background-position-x: -140px; }
    }

    /* Purple R34 Skyline SVG - Stationary with spinning wheels */
    .car {
      position: absolute;
      bottom: 19%;
      left: 50%;
      transform: translateX(-50%);
      width: 210px;
      z-index: 5;
      filter: drop-shadow(0 20px 30px #ff00ff);
      animation: carIdle 1.1s infinite alternate ease-in-out;
    }

    @keyframes carIdle {
      from { transform: translateX(-50%) translateY(0px); }
      to   { transform: translateX(-50%) translateY(-6px); }
    }

    .wheel {
      animation: spin 0.35s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <!-- Background Equalizer - Much Bigger -->
  <div class="equalizer">
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
  </div>

  <!-- Road -->
  <div class="road"></div>

  <!-- Side road details -->
  <div class="road-details"></div>

  <!-- Purple R34 Skyline SVG -->
  <svg class="car" viewBox="0 0 260 110" xmlns="http://www.w3.org/2000/svg">
    <!-- Main body - Deep Purple -->
    <path d="M25 68 Q25 48 48 42 Q105 28 195 38 Q225 45 235 65 Q235 82 215 88 L45 88 Q30 82 25 68" fill="#4a1c4a" stroke="#00ffff" stroke-width="12"/>
    
    <!-- Lower body accent -->
    <path d="M35 78 Q45 85 210 85 L215 78" fill="#2a0a2a"/>
    
    <!-- Windows -->
    <path d="M65 48 Q85 38 125 38 Q165 40 185 52 L175 65 L75 65 Z" fill="#0f1428" stroke="#00ffff" stroke-width="6"/>
    
    <!-- Headlights -->
    <rect x="220" y="62" width="18" height="16" rx="4" fill="#ffee00"/>
    <!-- Taillights -->
    <rect x="22" y="65" width="14" height="18" rx="3" fill="#ff0088"/>
    
    <!-- Front bumper & grille area -->
    <rect x="28" y="70" width="45" height="12" rx="4" fill="#1a1a2a"/>
    
    <!-- Wheels -->
    <g class="wheel">
      <circle cx="75" cy="88" r="22" fill="#111" stroke="#00ffff" stroke-width="12"/>
      <circle cx="75" cy="88" r="13" fill="#222"/>
      <circle cx="75" cy="88" r="7" fill="#444"/>
    </g>
    <g class="wheel">
      <circle cx="175" cy="88" r="22" fill="#111" stroke="#00ffff" stroke-width="12"/>
      <circle cx="175" cy="88" r="13" fill="#222"/>
      <circle cx="175" cy="88" r="7" fill="#444"/>
    </g>

    <!-- Spoiler -->
    <rect x="185" y="38" width="48" height="9" rx="2" fill="#ff00aa"/>
    <polygon points="185,38 233,38 228,32" fill="#c00080"/>
  </svg>

</body>
</html>
