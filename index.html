<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neon Night Drive</title>
  <style>
    * { box-sizing: border-box; }
    body, html { margin: 0; padding: 0; overflow: hidden; background: #05040f; color: #fff; font-family: 'Segoe UI', sans-serif; }
    #app { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
    canvas { position: absolute; inset: 0; display: block; }
    .hud {
      position: absolute;
      right: 20px;
      top: 20px;
      width: 340px;
      max-width: calc(100vw - 40px);
      padding: 22px;
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 28px;
      backdrop-filter: blur(20px);
      background: linear-gradient(180deg, rgba(12,14,30,0.95), rgba(2,4,14,0.92));
      box-shadow: 0 24px 120px rgba(0,0,0,.35);
      z-index: 10;
      overflow: hidden;
    }
    .hud::before,
    .hud::after {
      content: '';
      position: absolute;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      pointer-events: none;
    }
    .hud::before {
      width: 80px;
      height: 18px;
      top: 12px;
      left: 20px;
      box-shadow: inset 0 0 18px rgba(255,255,255,0.18);
    }
    .hud::after {
      width: 42px;
      height: 42px;
      top: 16px;
      right: 20px;
      box-shadow: inset 0 0 18px rgba(255,255,255,0.12);
    }
    .hud h1 { margin: 0 0 8px; font-size: 20px; letter-spacing: 0.03em; }
    .hud p { margin: 0 0 14px; line-height: 1.45; color: #bbc6ff; }
    .player { display: grid; gap: 12px; }
    .player button,
    .player select,
    .player input[type=range] {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 12px 14px;
      background: rgba(255,255,255,.08);
      color: #fff;
      font-size: 14px;
      outline: none;
      cursor: pointer;
    }
    .actions { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .actions button { padding: 12px 0; font-weight: 700; }
    .track-info { display: grid; gap: 4px; }
    .track-info .label { font-size: 12px; color: #8e9eff; text-transform: uppercase; letter-spacing: .12em; }
    .track-info .value { font-size: 15px; }
    .meter { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
    .meter span { display: block; height: 8px; background: rgba(255,255,255,.12); border-radius: 999px; overflow: hidden; position: relative; }
    .meter span::after { content: '';
      position: absolute; inset: 0;
      width: 0%;
      background: linear-gradient(90deg, #6b9dff, #f94cff, #1bc7ff);
      transition: width 0.1s ease;
    }
    .file-row { display: flex; gap: 10px; align-items: center; }
    .file-row label { flex: 1; display: block; cursor: pointer; }
    .file-row input[type=file] { width: 100%; }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="scene"></canvas>
    <div class="hud">
      <h1>Neon Night Drive</h1>
      <p>Load a track or choose a sample. The city road, stars, headlights, and car react to bass, treble and beat.</p>
      <div class="player">
        <div class="track-info">
          <span class="label">Now playing</span>
          <span class="value" id="trackTitle">Electric Pulse</span>
        </div>
        <div class="track-info">
          <span class="label">Current palette</span>
          <span class="value" id="moodLabel">Electric Blue</span>
        </div>
        <select id="presetSelect">
          <option value="electric">Electric Blue</option>
          <option value="sunset">Sunset Pulse</option>
          <option value="violet">Violet Drift</option>
          <option value="cyber">Cyberwave</option>
        </select>
        <div class="file-row">
          <input id="fileInput" type="file" accept="audio/*" />
        </div>
        <select id="sampleSelect">
          <option value="">Choose sample track</option>
          <option value="https://interactive-examples.mdn.mozilla.net/media/examples/t-rex-roar.mp3" data-title="Neon Drive">Sample 1</option>
          <option value="https://interactive-examples.mdn.mozilla.net/media/examples/flower.mp3" data-title="Flower Glow">Sample 2</option>
        </select>
        <div class="actions">
          <button id="prevBtn">Prev</button>
          <button id="playBtn">Play</button>
          <button id="nextBtn">Next</button>
        </div>
        <input id="volume" type="range" min="0" max="1" step="0.01" value="0.75" />
        <div class="meter">
          <span><span id="bassMeter"></span></span>
          <span><span id="midMeter"></span></span>
          <span><span id="trebleMeter"></span></span>
        </div>
      </div>
    </div>
  </div>
  <audio id="audio" crossorigin="anonymous"></audio>
  <script>
    const canvas = document.getElementById('scene');
    const ctx = canvas.getContext('2d');
    const audioEl = document.getElementById('audio');
    const playBtn = document.getElementById('playBtn');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const volumeControl = document.getElementById('volume');
    const fileInput = document.getElementById('fileInput');
    const sampleSelect = document.getElementById('sampleSelect');
    const presetSelect = document.getElementById('presetSelect');
    const moodLabel = document.getElementById('moodLabel');
    const trackTitle = document.getElementById('trackTitle');
    const bassMeter = document.getElementById('bassMeter');
    const midMeter = document.getElementById('midMeter');
    const trebleMeter = document.getElementById('trebleMeter');

    const presets = {
      electric: {
        sky: ['#09102a', '#0a1136', '#1d2c76'],
        road: ['#0c0d16', '#11151f'],
        glow: '#3bd7ff',
        stars: '#8dc8ff',
        car: '#46e3ff',
        accent: '#ff4ceb'
      },
      sunset: {
        sky: ['#21021f', '#2f072c', '#6d103f'],
        road: ['#120a10', '#221018'],
        glow: '#ff9d3f',
        stars: '#ffd785',
        car: '#ff5f85',
        accent: '#ffd65a'
      },
      violet: {
        sky: ['#12041c', '#1b0d30', '#3c1b68'],
        road: ['#130c17', '#1a1026'],
        glow: '#a96cff',
        stars: '#dabcff',
        car: '#d3a0ff',
        accent: '#5fd6ff'
      },
      cyber: {
        sky: ['#020714', '#05183d', '#0d2e83'],
        road: ['#05091d', '#09122f'],
        glow: '#00f4d4',
        stars: '#8bfffa',
        car: '#71f5ff',
        accent: '#ff60f0'
      }
    };

    const playlist = [
      { title: 'Neon Drive', src: 'https://interactive-examples.mdn.mozilla.net/media/examples/t-rex-roar.mp3' },
      { title: 'City Pulse', src: 'https://cdn.pixabay.com/download/audio/2022/03/15/audio_d33fa3d043.mp3?filename=funky-city-11316.mp3' },
      { title: 'Vaporwave Night', src: 'https://cdn.pixabay.com/download/audio/2022/03/16/audio_e1f4b5b814.mp3?filename=neon-vaporwave-11346.mp3' }
    ];
    let currentIndex = 0;

    let width = window.innerWidth;
    let height = window.innerHeight;
    canvas.width = width;
    canvas.height = height;

    let audioCtx;
    let analyser;
    let dataArray;
    let sourceNode;
    let smoothing = 0.82;
    let bassLevel = 0;
    let midLevel = 0;
    let trebleLevel = 0;
    let beatLevel = 0;
    let lastBeat = 0;
    let beatCooldown = 0;
    let time = 0;
    let speed = 1;
    let stars = [];
    let roadSegments = [];
    let palette = presets.electric;
    let moodState = 'electric';

    function resize() {
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = width;
      canvas.height = height;
    }

    function createAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 2048;
        analyser.smoothingTimeConstant = smoothing;
        dataArray = new Uint8Array(analyser.frequencyBinCount);
        sourceNode = audioCtx.createMediaElementSource(audioEl);
        sourceNode.connect(analyser);
        analyser.connect(audioCtx.destination);
      }
    }

    function updateTrackTitle() {
      trackTitle.textContent = playlist[currentIndex].title || 'Unknown track';
    }

    function loadSong(index) {
      if (playlist[index].src) {
        audioEl.src = playlist[index].src;
      }
      updateTrackTitle();
    }

    function pickPalette(key) {
      palette = presets[key] || presets.electric;
      moodLabel.textContent = key.replace(/^(.)/, c => c.toUpperCase());
      moodState = key;
    }

    function updateAudioValues() {
      if (!analyser) return;
      analyser.getByteFrequencyData(dataArray);
      const bass = averageRange(20, 80);
      const mids = averageRange(81, 300);
      const treb = averageRange(301, 1024);
      bassLevel = Math.max(bassLevel * 0.92, bass / 255);
      midLevel = Math.max(midLevel * 0.92, mids / 255);
      trebleLevel = Math.max(trebleLevel * 0.92, treb / 255);
      bassMeter.style.setProperty('--value', (bassLevel * 100) + '%');
      midMeter.style.setProperty('--value', (midLevel * 100) + '%');
      trebleMeter.style.setProperty('--value', (trebleLevel * 100) + '%');
      bassMeter.style.width = `${Math.min(100, bassLevel * 120)}%`;
      midMeter.style.width = `${Math.min(100, midLevel * 120)}%`;
      trebleMeter.style.width = `${Math.min(100, trebleLevel * 120)}%`;
      const now = performance.now();
      const beatDetect = bassLevel * 1.4 + midLevel * 0.5;
      if (beatDetect > 0.6 && now - lastBeat > 250) {
        beatLevel = 1;
        lastBeat = now;
      }
      beatLevel = Math.max(0, beatLevel - 0.04);
    }

    function averageRange(minHz, maxHz) {
      const nyquist = audioCtx.sampleRate / 2;
      const start = Math.floor(minHz / nyquist * dataArray.length);
      const end = Math.min(dataArray.length - 1, Math.floor(maxHz / nyquist * dataArray.length));
      let sum = 0;
      let count = 0;
      for (let i = start; i <= end; i++) {
        sum += dataArray[i];
        count++;
      }
      return count ? sum / count : 0;
    }

    function initStars() {
      stars = Array.from({ length: 120 }, () => ({
        x: Math.random() * width,
        y: Math.random() * height * 0.6,
        radius: Math.random() * 1.8 + 0.8,
        brightness: Math.random() * 0.5 + 0.3,
        phase: Math.random() * Math.PI * 2
      }));
    }

    function initRoad() {
      roadSegments = [];
      const segmentCount = 28;
      for (let i = 0; i < segmentCount; i++) {
        roadSegments.push({ z: i / segmentCount, wobble: Math.sin(i * 0.8) * 120 });
      }
    }

    function draw() {
      ctx.clearRect(0, 0, width, height);
      drawSky();
      drawStars();
      drawRoad();
      drawRoadGlow();
      drawCar();
      drawHeadlights();
      drawParticles();
      time += 0.016;
      requestAnimationFrame(draw);
    }

    function drawSky() {
      const gradient = ctx.createLinearGradient(0, 0, 0, height);
      palette.sky.forEach((color, index) => gradient.addColorStop(index / (palette.sky.length - 1), color));
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, width, height);

      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      const glow = 25 + bassLevel * 120;
      ctx.fillStyle = `rgba(255,255,255,${0.04 + trebleLevel * 0.2})`;
      ctx.shadowColor = palette.accent;
      ctx.shadowBlur = glow;
      ctx.fillRect(width * 0.3, height * 0.1, width * 0.45, height * 0.18);
      ctx.restore();
    }

    function drawStars() {
      stars.forEach(star => {
        const pulse = Math.sin(time * 3 + star.phase) * 0.3 + 0.7 + trebleLevel * 0.8;
        const brightness = star.brightness + pulse * 0.3;
        ctx.fillStyle = `rgba(255,255,255,${brightness})`;
        ctx.beginPath();
        ctx.arc(star.x, star.y, star.radius * (1 + trebleLevel * 0.4), 0, Math.PI * 2);
        ctx.fill();
      });
    }

    function drawRoad() {
      const roadBaseY = height * 0.65;
      roadSegments.forEach((segment, i) => {
        const perspective = (i + 1) / roadSegments.length;
        const segmentWidth = width * (0.7 - perspective * 0.55);
        const x = width / 2 + segment.wobble * (1 - perspective) * 0.7;
        const y = roadBaseY + perspective * height * 0.35;
        const alpha = 0.12 + perspective * 0.2 + bassLevel * 0.15;
        ctx.fillStyle = `rgba(15,18,34,${alpha})`;
        ctx.beginPath();
        ctx.moveTo(width * 0.5 - segmentWidth / 2, y);
        ctx.lineTo(width * 0.5 + segmentWidth / 2, y);
        ctx.lineTo(width * 0.5 + segmentWidth / 2 - 20, y + 72);
        ctx.lineTo(width * 0.5 - segmentWidth / 2 + 20, y + 72);
        ctx.closePath();
        ctx.fill();
      });
    }

    function drawRoadGlow() {
      const roadBaseY = height * 0.65;
      const glowWidth = 360 + bassLevel * 520;
      const glowAlpha = 0.12 + bassLevel * 0.35;
      const x = width / 2;
      const y = roadBaseY + 50;
      const grad = ctx.createRadialGradient(x, y, 0, x, y, glowWidth);
      grad.addColorStop(0, hexAlpha(palette.glow, glowAlpha));
      grad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(x, y, glowWidth, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawCar() {
      const carWidth = 320;
      const carHeight = 100;
      const x = width / 2;
      const y = height * 0.67 - beatLevel * 15;
      ctx.save();
      ctx.translate(x, y);
      ctx.shadowBlur = 32 + bassLevel * 55;
      ctx.shadowColor = palette.accent;
      ctx.fillStyle = palette.car;
      ctx.strokeStyle = palette.accent;
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(-carWidth * 0.45, 7);
      ctx.bezierCurveTo(-carWidth * 0.4, -40, -carWidth * 0.22, -54, -carWidth * 0.05, -48);
      ctx.lineTo(carWidth * 0.15, -40);
      ctx.quadraticCurveTo(carWidth * 0.35, -36, carWidth * 0.44, -18);
      ctx.lineTo(carWidth * 0.45, 6);
      ctx.lineTo(carWidth * 0.4, 18);
      ctx.quadraticCurveTo(carWidth * 0.05, 42, -carWidth * 0.38, 24);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = '#09131f';
      ctx.beginPath();
      ctx.moveTo(-carWidth * 0.33, 5);
      ctx.lineTo(-carWidth * 0.18, -24);
      ctx.lineTo(carWidth * 0.02, -24);
      ctx.lineTo(carWidth * 0.1, 2);
      ctx.lineTo(-carWidth * 0.33, 5);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(carWidth * 0.1, 2);
      ctx.lineTo(carWidth * 0.28, -24);
      ctx.lineTo(carWidth * 0.40, -24);
      ctx.lineTo(carWidth * 0.30, 12);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.5)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(-carWidth * 0.32, -10);
      ctx.lineTo(-carWidth * 0.1, -14);
      ctx.lineTo(carWidth * 0.08, -12);
      ctx.lineTo(carWidth * 0.28, -8);
      ctx.stroke();
      ctx.restore();
    }

    function drawHeadlights() {
      const x = width / 2;
      const y = height * 0.69 - beatLevel * 15;
      const flash = 0.7 + beatLevel * 0.5;
      const left = x - 120;
      const right = x + 120;
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      const soft = ctx.createRadialGradient(left, y + 10, 0, left, y + 10, 170);
      soft.addColorStop(0, `rgba(255, 255, 214, ${0.12 * flash})`);
      soft.addColorStop(1, 'rgba(255,255,214,0)');
      ctx.fillStyle = soft;
      ctx.fillRect(left - 180, y - 10, 360, 180);
      const soft2 = ctx.createRadialGradient(right, y + 10, 0, right, y + 10, 170);
      soft2.addColorStop(0, `rgba(255, 255, 214, ${0.12 * flash})`);
      soft2.addColorStop(1, 'rgba(255,255,214,0)');
      ctx.fillStyle = soft2;
      ctx.fillRect(right - 180, y - 10, 360, 180);
      ctx.restore();
    }

    function drawParticles() {
      const particleCount = 18;
      for (let i = 0; i < particleCount; i++) {
        const px = width / 2 + Math.sin(time * 2.1 + i) * 220;
        const py = height * 0.57 + (i - particleCount / 2) * 10 + Math.cos(time * 1.8 + i * 0.8) * 12;
        const alpha = 0.2 + bassLevel * 0.5 + Math.abs(Math.sin(time * 3 + i)) * 0.12;
        ctx.fillStyle = `rgba(255,255,255,${alpha})`;
        ctx.beginPath();
        ctx.arc(px, py, 3 + trebleLevel * 2, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function loop() {
      updateAudioValues();
      requestAnimationFrame(loop);
    }

    function hexAlpha(hex, alpha) {
      const clean = hex.replace('#', '');
      const num = parseInt(clean, 16);
      const r = (num >> 16) & 255;
      const g = (num >> 8) & 255;
      const b = num & 255;
      return `rgba(${r},${g},${b},${alpha})`;
    }

    function init() {
      initStars();
      initRoad();
      createAudio();
      loadSong(currentIndex);
      pickPalette(moodState);
      draw();
      loop();
    }

    playBtn.addEventListener('click', () => {
      if (audioCtx && audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
      if (audioEl.paused) {
        audioEl.play();
        playBtn.textContent = 'Pause';
      } else {
        audioEl.pause();
        playBtn.textContent = 'Play';
      }
    });

    prevBtn.addEventListener('click', () => {
      currentIndex = (currentIndex - 1 + playlist.length) % playlist.length;
      loadSong(currentIndex);
      audioEl.play();
      playBtn.textContent = 'Pause';
    });

    nextBtn.addEventListener('click', () => {
      currentIndex = (currentIndex + 1) % playlist.length;
      loadSong(currentIndex);
      audioEl.play();
      playBtn.textContent = 'Pause';
    });

    volumeControl.addEventListener('input', () => {
      audioEl.volume = volumeControl.value;
    });

    fileInput.addEventListener('change', event => {
      const file = event.target.files[0];
      if (!file) return;
      const url = URL.createObjectURL(file);
      audioEl.src = url;
      trackTitle.textContent = file.name;
      audioEl.play();
      playBtn.textContent = 'Pause';
    });

    sampleSelect.addEventListener('change', event => {
      const src = event.target.value;
      const selectedTitle = event.target.selectedOptions[0]?.dataset.title || 'Sample Track';
      if (!src) return;
      audioEl.src = src;
      trackTitle.textContent = selectedTitle;
      audioEl.play();
      playBtn.textContent = 'Pause';
    });

    presetSelect.addEventListener('change', event => {
      pickPalette(event.target.value);
    });

    window.addEventListener('resize', () => {
      resize();
      initStars();
      initRoad();
    });

    init();
  </script>
</body>
</html>
