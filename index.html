<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Moving Equalizer Background</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      overflow: hidden;
      background: linear-gradient(135deg, #1a0033, #000);
      animation: backgroundShift 60s infinite linear;
      position: relative;
    }

    /* Smooth color cycling */
    @keyframes backgroundShift {
      0%    { background: linear-gradient(135deg, #0033ff, #000033); }
      15%   { background: linear-gradient(135deg, #8a2be2, #330033); }
      30%   { background: linear-gradient(135deg, #ff0080, #330000); }
      45%   { background: linear-gradient(135deg, #ff00ff, #330033); }
      60%   { background: linear-gradient(135deg, #00ffff, #003333); }
      75%   { background: linear-gradient(135deg, #ff3300, #331100); }
      100%  { background: linear-gradient(135deg, #0033ff, #000033); }
    }

    .equalizer {
      position: absolute;
      bottom: 15%;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 6px;
      z-index: 2;
    }

    .bar {
      width: 18px;
      height: 80px;
      background: linear-gradient(to top, #00ffcc, #ff00ff);
      border-radius: 4px;
      animation: equalizerAnim 0.6s infinite alternate ease-in-out;
      box-shadow: 0 0 12px currentColor;
    }

    .bar:nth-child(1) { animation-delay: 0ms; height: 120px; }
    .bar:nth-child(2) { animation-delay: 80ms; height: 80px; }
    .bar:nth-child(3) { animation-delay: 150ms; height: 160px; }
    .bar:nth-child(4) { animation-delay: 60ms; height: 90px; }
    .bar:nth-child(5) { animation-delay: 200ms; height: 140px; }
    .bar:nth-child(6) { animation-delay: 40ms; height: 70px; }
    .bar:nth-child(7) { animation-delay: 120ms; height: 130px; }

    @keyframes equalizerAnim {
      from { height: 40px; }
      to   { height: 180px; }
    }

    /* Glitch effect */
    .equalizer::after {
      content: '';
      position: absolute;
      top: -20%;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(255, 0, 255, 0.1);
      animation: glitch 0.3s infinite linear alternate;
      pointer-events: none;
    }

    @keyframes glitch {
      0% { transform: translate(2px, 0); }
      100% { transform: translate(-2px, 0); }
    }
  </style>
</head>
<body>

  <div class="equalizer">
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
  </div>

</body>
</html>
