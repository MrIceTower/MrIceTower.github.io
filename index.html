<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NEON DRIVE X</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  overflow:hidden;
  background:#05010f;
  font-family:'Share Tech Mono',monospace;
  color:white;
}

canvas{
  display:block;
}

#bg{
  position:fixed;
  inset:0;
  z-index:0;
}

#game{
  position:fixed;
  inset:0;
  z-index:5;
  pointer-events:none;
}

#hud{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  z-index:20;
  font-family:'Orbitron',sans-serif;
  letter-spacing:4px;
  font-size:12px;
  color:#00f0ff;
  text-shadow:0 0 10px #00f0ff;
}

#score{
  position:fixed;
  left:20px;
  bottom:20px;
  z-index:20;
  font-family:'Orbitron',sans-serif;
  font-size:20px;
  color:#00f0ff;
  text-shadow:0 0 10px #00f0ff;
}

#speed{
  position:fixed;
  left:20px;
  bottom:55px;
  z-index:20;
  font-family:'Orbitron',sans-serif;
  font-size:16px;
  color:#ffffffaa;
}

#playBtn{
  position:fixed;
  top:20px;
  right:20px;
  z-index:30;

  border:1px solid #00f0ff;
  background:transparent;
  color:#00f0ff;

  padding:12px 24px;
  cursor:pointer;

  font-family:'Orbitron',sans-serif;
  letter-spacing:3px;

  box-shadow:0 0 20px #00f0ff55;
}

#playBtn:hover{
  background:#00f0ff11;
}

#eq{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:120px;
  z-index:10;
}

.scan{
  position:fixed;
  inset:0;
  z-index:100;
  pointer-events:none;

  background:
    repeating-linear-gradient(
      0deg,
      rgba(255,255,255,0.03) 0px,
      rgba(255,255,255,0.03) 1px,
      transparent 1px,
      transparent 3px
    );
}

.vignette{
  position:fixed;
  inset:0;
  z-index:99;
  pointer-events:none;

  background:
    radial-gradient(circle at center,
    transparent 40%,
    rgba(0,0,0,0.6) 100%);
}

#controls{
  position:fixed;
  top:60px;
  left:50%;
  transform:translateX(-50%);
  z-index:20;

  color:#ffffff88;
  font-size:11px;
  letter-spacing:2px;
}

</style>
</head>

<body>

<canvas id="bg"></canvas>
<canvas id="game"></canvas>
<canvas id="eq"></canvas>

<div id="hud">◀ NEON DRIVE ▶</div>
<div id="controls">← → STEER · ↑ ACCELERATE · ↓ BRAKE</div>

<div id="score">SCORE 0</div>
<div id="speed">SPD 0</div>

<button id="playBtn">▶ PLAY GAME</button>

<div class="scan"></div>
<div class="vignette"></div>

<script>

const bg = document.getElementById("bg");
const btx = bg.getContext("2d");

const game = document.getElementById("game");
const gtx = game.getContext("2d");

const eq = document.getElementById("eq");
const etx = eq.getContext("2d");

function resize(){
  bg.width = innerWidth;
  bg.height = innerHeight;

  game.width = innerWidth;
  game.height = innerHeight;

  eq.width = innerWidth;
  eq.height = 120;
}
resize();
addEventListener("resize", resize);

/////////////////////////////////////////////////////////
// THEMES
/////////////////////////////////////////////////////////

const THEMES = [

{
  accent:"#ff2d78",
  sky1:"#18001f",
  sky2:"#ff0066",
  glow:"#ff66aa",
  type:"sun"
},

{
  accent:"#00f0ff",
  sky1:"#001018",
  sky2:"#00ffd0",
  glow:"#00f0ff",
  type:"moon"
},

{
  accent:"#ffffff",
  sky1:"#000000",
  sky2:"#3a2a4a",
  glow:"#ffffff",
  type:"blackhole"
},

{
  accent:"#a855ff",
  sky1:"#12002e",
  sky2:"#8b5cf6",
  glow:"#d8b4fe",
  type:"galaxy"
}

];

let theme = 0;

/////////////////////////////////////////////////////////
// STARS
/////////////////////////////////////////////////////////

const stars = [];

for(let i=0;i<220;i++){

  stars.push({

    x:Math.random(),
    y:Math.random(),

    size:Math.random()*2,
    depth:Math.random()

  });

}

/////////////////////////////////////////////////////////
// GAME
/////////////////////////////////////////////////////////

let running = false;

const player = {

  x:0,
  targetX:0,
  z:1,
  speed:0,
  maxSpeed:1.8

};

const enemies = [];

let score = 0;

const keys = {};

addEventListener("keydown", e=>{

  keys[e.key] = true;

});

addEventListener("keyup", e=>{

  keys[e.key] = false;

});

document.getElementById("playBtn").onclick = ()=>{

  running = !running;

  document.getElementById("playBtn").innerHTML =
    running ? "✕ EXIT GAME" : "▶ PLAY GAME";

};

/////////////////////////////////////////////////////////
// SPAWN ENEMIES
/////////////////////////////////////////////////////////

function spawnEnemy(){

  enemies.push({

    x:(Math.random()-0.5)*1.5,
    z:1,

    color:[
      "#ff2d78",
      "#00f0ff",
      "#ffee00",
      "#00ff88",
      "#ff6600"
    ][Math.floor(Math.random()*5)]

  });

}

setInterval(()=>{

  if(running){

    spawnEnemy();

  }

},700);

/////////////////////////////////////////////////////////
// DRAW SKY
/////////////////////////////////////////////////////////

function drawSky(t){

  const T = THEMES[theme];

  const g = btx.createLinearGradient(0,0,0,innerHeight);

  g.addColorStop(0,T.sky1);
  g.addColorStop(1,T.sky2);

  btx.fillStyle = g;
  btx.fillRect(0,0,innerWidth,innerHeight);

  /////////////////////////////////////////////////////
  // STARS
  /////////////////////////////////////////////////////

  stars.forEach(s=>{

    const x = s.x * innerWidth;
    const y = s.y * innerHeight * 0.7;

    const glow =
      Math.sin(t*0.001 + s.depth*10)*0.5+0.5;

    btx.beginPath();

    btx.arc(x,y,s.size,0,Math.PI*2);

    btx.fillStyle =
      `rgba(255,255,255,${0.3+glow*0.7})`;

    btx.fill();

  });

  /////////////////////////////////////////////////////
  // CENTER OBJECT
  /////////////////////////////////////////////////////

  if(T.type==="sun"){

    const x = innerWidth/2;
    const y = innerHeight*0.35;

    const r = innerWidth*0.12;

    const glow = btx.createRadialGradient(
      x,y,0,x,y,r*2
    );

    glow.addColorStop(0,"rgba(255,200,0,0.5)");
    glow.addColorStop(1,"transparent");

    btx.fillStyle = glow;

    btx.beginPath();
    btx.arc(x,y,r*2,0,Math.PI*2);
    btx.fill();

    btx.fillStyle = "#ffcc55";

    btx.beginPath();
    btx.arc(x,y,r,0,Math.PI*2);
    btx.fill();

  }

  if(T.type==="moon"){

    const x = innerWidth/2;
    const y = innerHeight*0.35;

    const r = innerWidth*0.12;

    const g = btx.createRadialGradient(
      x,y,0,x,y,r*1.5
    );

    g.addColorStop(0,"#ffffff");
    g.addColorStop(1,"#8899aa");

    btx.fillStyle = g;

    btx.beginPath();
    btx.arc(x,y,r,0,Math.PI*2);
    btx.fill();

  }

  if(T.type==="blackhole"){

    const x = innerWidth/2;
    const y = innerHeight*0.35;

    btx.strokeStyle = "#ffccaa88";

    for(let i=0;i<6;i++){

      btx.beginPath();

      btx.ellipse(
        x,
        y+20,
        180+i*12,
        40+i*4,
        0,
        0,
        Math.PI*2
      );

      btx.lineWidth = 8-i;

      btx.stroke();

    }

    btx.fillStyle = "#000";

    btx.beginPath();
    btx.arc(x,y,120,0,Math.PI*2);
    btx.fill();

  }

  if(T.type==="galaxy"){

    const x = innerWidth/2;
    const y = innerHeight*0.35;

    for(let i=0;i<9;i++){

      btx.beginPath();

      btx.ellipse(
        x,
        y,
        60+i*40,
        30+i*20,
        0.5,
        0,
        Math.PI*2
      );

      btx.strokeStyle =
        `rgba(255,255,255,${0.15-i*0.01})`;

      btx.stroke();

    }

    const g = btx.createRadialGradient(
      x,y,0,x,y,180
    );

    g.addColorStop(0,"white");
    g.addColorStop(1,"transparent");

    btx.fillStyle = g;

    btx.beginPath();
    btx.arc(x,y,180,0,Math.PI*2);
    btx.fill();

  }

}

/////////////////////////////////////////////////////////
// ROAD
/////////////////////////////////////////////////////////

function drawRoad(t){

  const T = THEMES[theme];

  const horizon = innerHeight*0.45;

  const roadWBottom = innerWidth*0.9;
  const roadWTop = 80;

  /////////////////////////////////////////////////////
  // ROAD
  /////////////////////////////////////////////////////

  gtx.beginPath();

  gtx.moveTo(innerWidth/2-roadWTop/2,horizon);

  gtx.lineTo(innerWidth/2+roadWTop/2,horizon);

  gtx.lineTo(innerWidth/2+roadWBottom/2,innerHeight);

  gtx.lineTo(innerWidth/2-roadWBottom/2,innerHeight);

  gtx.closePath();

  const rg = gtx.createLinearGradient(
    0,horizon,
    0,innerHeight
  );

  rg.addColorStop(0,"#050505");
  rg.addColorStop(1,"#000");

  gtx.fillStyle = rg;
  gtx.fill();

  /////////////////////////////////////////////////////
  // GRID
  /////////////////////////////////////////////////////

  gtx.strokeStyle = T.accent;
  gtx.shadowBlur = 15;
  gtx.shadowColor = T.accent;

  for(let i=0;i<40;i++){

    const p = i/40;

    const y =
      horizon +
      Math.pow(p,2)*(innerHeight-horizon);

    gtx.beginPath();

    gtx.moveTo(
      innerWidth/2 -
      roadWTop/2 -
      p*roadWBottom/2,
      y
    );

    gtx.lineTo(
      innerWidth/2 +
      roadWTop/2 +
      p*roadWBottom/2,
      y
    );

    gtx.stroke();

  }

  /////////////////////////////////////////////////////
  // VERTICAL LINES
  /////////////////////////////////////////////////////

  for(let i=-10;i<=10;i++){

    gtx.beginPath();

    gtx.moveTo(innerWidth/2,horizon);

    gtx.lineTo(
      innerWidth/2 + i*120,
      innerHeight
    );

    gtx.stroke();

  }

  /////////////////////////////////////////////////////
  // FOG
  /////////////////////////////////////////////////////

  const fog = gtx.createLinearGradient(
    0,horizon,
    0,innerHeight
  );

  fog.addColorStop(0,"transparent");
  fog.addColorStop(1,"rgba(0,0,0,0.8)");

  gtx.fillStyle = fog;

  gtx.fillRect(
    0,horizon,
    innerWidth,
    innerHeight-horizon
  );

}

/////////////////////////////////////////////////////////
// PROJECT
/////////////////////////////////////////////////////////

function project(z,x){

  const scale = 1/z;

  return {

    x:
      innerWidth/2 +
      x*scale*500,

    y:
      innerHeight*0.45 +
      scale*innerHeight*0.5,

    scale

  };

}

/////////////////////////////////////////////////////////
// DRAW CAR
/////////////////////////////////////////////////////////

function drawCar(x,y,s,color){

  gtx.save();

  gtx.translate(x,y);

  gtx.scale(s,s);

  gtx.shadowBlur = 20;
  gtx.shadowColor = color;

  /////////////////////////////////////////////////////
  // GLOW
  /////////////////////////////////////////////////////

  gtx.fillStyle = color+"33";

  gtx.fillRect(-40,-70,80,140);

  /////////////////////////////////////////////////////
  // BODY
  /////////////////////////////////////////////////////

  gtx.fillStyle = "#050510";

  gtx.strokeStyle = color;

  gtx.lineWidth = 3;

  gtx.beginPath();

  gtx.roundRect(-25,-50,50,100,10);

  gtx.fill();
  gtx.stroke();

  /////////////////////////////////////////////////////
  // LIGHTS
  /////////////////////////////////////////////////////

  gtx.fillStyle = color;

  gtx.fillRect(-18,35,12,6);
  gtx.fillRect(6,35,12,6);

  /////////////////////////////////////////////////////
  // UNDERGLOW
  /////////////////////////////////////////////////////

  const ug = gtx.createLinearGradient(
    -30,50,
    30,50
  );

  ug.addColorStop(0,"transparent");
  ug.addColorStop(0.5,color);
  ug.addColorStop(1,"transparent");

  gtx.fillStyle = ug;

  gtx.fillRect(-35,48,70,10);

  gtx.restore();

}

/////////////////////////////////////////////////////////
// GAME LOOP
/////////////////////////////////////////////////////////

function loop(t){

  btx.clearRect(0,0,innerWidth,innerHeight);

  gtx.clearRect(0,0,innerWidth,innerHeight);

  drawSky(t);

  if(running){

    ///////////////////////////////////////////////////
    // SPEED
    ///////////////////////////////////////////////////

    if(keys["ArrowUp"]){

      player.speed += 0.01;

    }

    if(keys["ArrowDown"]){

      player.speed -= 0.01;

    }

    player.speed *= 0.98;

    player.speed =
      Math.max(0.3,
      Math.min(player.maxSpeed,player.speed));

    ///////////////////////////////////////////////////
    // MOVE
    ///////////////////////////////////////////////////

    if(keys["ArrowLeft"]){

      player.targetX -= 0.03;

    }

    if(keys["ArrowRight"]){

      player.targetX += 0.03;

    }

    player.targetX =
      Math.max(-1.2,
      Math.min(1.2,player.targetX));

    player.x +=
      (player.targetX-player.x)*0.08;

    ///////////////////////////////////////////////////
    // ROAD
    ///////////////////////////////////////////////////

    drawRoad(t);

    ///////////////////////////////////////////////////
    // ENEMIES
    ///////////////////////////////////////////////////

    enemies.forEach(e=>{

      e.z -= 0.01 * player.speed;

      const p = project(e.z,e.x);

      drawCar(
        p.x,
        p.y,
        p.scale*0.6,
        e.color
      );

    });

    ///////////////////////////////////////////////////
    // REMOVE
    ///////////////////////////////////////////////////

    for(let i=enemies.length-1;i>=0;i--){

      if(enemies[i].z<=0.1){

        enemies.splice(i,1);

        score += 100;

      }

    }

    ///////////////////////////////////////////////////
    // PLAYER
    ///////////////////////////////////////////////////

    const px =
      innerWidth/2 + player.x*350;

    const py =
      innerHeight-140;

    drawCar(
      px,
      py,
      1,
      THEMES[theme].accent
    );

    ///////////////////////////////////////////////////
    // UI
    ///////////////////////////////////////////////////

    document.getElementById("score").innerHTML =
      "SCORE " + score;

    document.getElementById("speed").innerHTML =
      "SPD " + player.speed.toFixed(1);

  }

  drawEQ(t);

  requestAnimationFrame(loop);

}

/////////////////////////////////////////////////////////
// EQ
/////////////////////////////////////////////////////////

function drawEQ(t){

  etx.clearRect(0,0,innerWidth,120);

  const T = THEMES[theme];

  const bars = 48;

  const w = innerWidth/bars;

  for(let i=0;i<bars;i++){

    const h =
      20+
      Math.sin(t*0.003+i*0.4)*40+
      Math.random()*20;

    etx.fillStyle = T.accent;

    etx.shadowBlur = 15;
    etx.shadowColor = T.accent;

    etx.fillRect(
      i*w,
      10,
      w-4,
      h
    );

  }

}

/////////////////////////////////////////////////////////
// CHANGE THEME
/////////////////////////////////////////////////////////

setInterval(()=>{

  theme++;

  if(theme>=THEMES.length){

    theme = 0;

  }

},15000);

/////////////////////////////////////////////////////////

requestAnimationFrame(loop);

</script>
</body>
</html>
