<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Neon Drive — Single File</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body { margin:0; height:100%; background:#000; color:#fff;
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    overflow:hidden; }
  canvas { position:fixed; inset:0; width:100%; height:100%; display:block; }
  .boombox {
    position:fixed; right:16px; bottom:16px; width:300px;
    background:linear-gradient(180deg,#181818,#0b0b0b);
    border:1px solid #ff3cac55; border-radius:14px; padding:14px;
    box-shadow: 0 0 30px #ff3cac33, inset 0 0 14px #00000088;
    z-index:5; user-select:none;
  }
  .label { font-size:9px; letter-spacing:.25em; text-transform:uppercase; opacity:.7; }
  .title { font-family: ui-monospace, Menlo, monospace; font-weight:700; font-size:13px;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .row { display:flex; align-items:center; justify-content:center; gap:8px; margin-top:10px; }
  button.ctrl {
    width:34px; height:34px; border-radius:50%; border:1px solid currentColor;
    background:transparent; color:#ff3cac; cursor:pointer; display:grid; place-items:center;
    font-size:14px; transition:.15s;
  }
  button.ctrl.big { width:44px; height:44px; font-size:18px; }
  button.ctrl:hover { background:#ff3cac22; box-shadow:0 0 10px currentColor; }
  input[type=range] { width:90px; accent-color:#ff3cac; }
  .stations { display:grid; grid-template-columns:repeat(4,1fr); gap:6px; margin-top:12px; }
  .stations button {
    background:transparent; border:1px solid currentColor; color:#ff3cac;
    border-radius:6px; padding:6px 2px; cursor:pointer;
    font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.1em;
    display:flex; flex-direction:column; align-items:center;
  }
  .stations button.active { background:currentColor; }
  .stations button.active span { color:#000; }
  .stations button span:last-child { font-size:8px; opacity:.85; }
  .info { text-align:center; }
  .hint { position:fixed; left:50%; bottom:8px; transform:translateX(-50%);
    font-size:10px; letter-spacing:.3em; text-transform:uppercase; opacity:.5; z-index:4; }
</style>
</head>
<body>
<canvas id="bg"></canvas>

<aside class="boombox" id="box">
  <div class="info">
    <div class="label" id="stationLabel">NEON://01 · SUN</div>
    <div class="title" id="songTitle">♪ —</div>
    <div class="label" id="songArtist">—</div>
  </div>
  <div class="row">
    <button class="ctrl" id="prev" title="Prev">⏮</button>
    <button class="ctrl big" id="play" title="Play">▶</button>
    <button class="ctrl" id="next" title="Next">⏭</button>
    <span style="opacity:.8;font-size:12px">🔊</span>
    <input id="vol" type="range" min="0" max="1" step="0.01" value="0.6" />
  </div>
  <div class="stations" id="stations"></div>
</aside>

<div class="hint" id="hint">press play to start the drive</div>

<script>
/* ===== Stations ===== */
const PAL = {
  miami: { sky1:"#1a0033", sky2:"#ff006e", sun1:"#ffe66d", sun2:"#ff006e", road:"#0a0014", grid:"#ff2a9d", car:"#ff3cac" },
  tokyo: { sky1:"#02010a", sky2:"#1de9b6", sun1:"#00e5ff", sun2:"#7c4dff", road:"#01020a", grid:"#00e5ff", car:"#00e5ff" },
  mono:  { sky1:"#000000", sky2:"#3a3a3a", sun1:"#ffffff", sun2:"#888888", road:"#050505", grid:"#ffffff", car:"#ffffff" },
  vapor: { sky1:"#0d0033", sky2:"#a06bff", sun1:"#ff77e9", sun2:"#7afcff", road:"#06001a", grid:"#a06bff", car:"#7afcff" },
};
const STATIONS = [
  { label:"NEON://01 · SUN",        horizon:"sun",       pal:PAL.miami, songs:[
      { title:"Last Friday Night (T.G.I.F.)", artist:"Katy Perry",       src:"audio/last-friday-night.mp3" },
      { title:"Ride",                          artist:"Twenty One Pilots", src:"audio/ride.mp3" }] },
  { label:"NEON://02 · MOON",       horizon:"moon",      pal:PAL.tokyo, songs:[
      { title:"After Dark",          artist:"Mr.Kitty", src:"audio/after-dark.mp3" },
      { title:"Don't Stop The Music",artist:"Rihanna",  src:"audio/dont-stop-the-music.mp3" }] },
  { label:"NEON://03 · BLACK HOLE", horizon:"blackhole", pal:PAL.mono,  songs:[
      { title:"Forever Young", artist:"Alphaville", src:"audio/forever-young.mp3" },
      { title:"Coachella",     artist:"—",          src:"audio/coachella.mp3" }] },
  { label:"NEON://04 · GALAXY",     horizon:"galaxy",    pal:PAL.vapor, songs:[
      { title:"Right Round", artist:"Flo Rida ft. Ke$ha", src:"audio/right-round.mp3" },
      { title:"Trap Queen",  artist:"Fetty Wap",          src:"audio/trap-queen.mp3" }] },
];

/* ===== State + audio ===== */
let stIdx = 0, sgIdx = 0, playing = false;
const audio = new Audio();
audio.preload = "auto";
audio.volume = 0.6;
let actx, analyser, srcNode;
function ensureCtx(){
  if (actx) return;
  actx = new (window.AudioContext || window.webkitAudioContext)();
  analyser = actx.createAnalyser(); analyser.fftSize = 1024; analyser.smoothingTimeConstant = .75;
  srcNode = actx.createMediaElementSource(audio);
  srcNode.connect(analyser); analyser.connect(actx.destination);
}

/* ===== UI ===== */
const $ = id => document.getElementById(id);
function curStation(){ return STATIONS[stIdx]; }
function curSong(){ return curStation().songs[sgIdx % curStation().songs.length]; }
function applyPalette(){
  const c = curStation().pal.car;
  document.querySelectorAll(".ctrl").forEach(b => b.style.color = c);
  document.querySelectorAll(".stations button").forEach((b,i)=>{
    b.style.color = c;
    b.classList.toggle("active", i===stIdx);
  });
  $("box").style.borderColor = c + "55";
  $("box").style.boxShadow = `0 0 30px ${c}33, inset 0 0 14px #00000088`;
}
function render(){
  $("stationLabel").textContent = `${curStation().label} · ${String(sgIdx+1).padStart(2,"0")}/${String(curStation().songs.length).padStart(2,"0")}`;
  $("songTitle").textContent = "♪ " + curSong().title;
  $("songArtist").textContent = curSong().artist;
  $("play").textContent = playing ? "⏸" : "▶";
  applyPalette();
}
function loadAndMaybePlay(autoplay){
  ensureCtx();
  const s = curSong().src;
  if (!audio.src.endsWith(s)) audio.src = s;
  if (autoplay) audio.play().catch(()=>{});
  render();
}
$("play").onclick = async () => {
  ensureCtx();
  if (actx.state === "suspended") await actx.resume();
  if (playing) { audio.pause(); playing = false; }
  else {
    const s = curSong().src;
    if (!audio.src.endsWith(s)) audio.src = s;
    try { await audio.play(); playing = true; $("hint").style.display = "none"; } catch {}
  }
  render();
};
$("next").onclick = () => {
  if (sgIdx + 1 < curStation().songs.length) sgIdx++;
  else { stIdx = (stIdx + 1) % STATIONS.length; sgIdx = 0; }
  loadAndMaybePlay(playing);
};
$("prev").onclick = () => {
  if (sgIdx > 0) sgIdx--;
  else { stIdx = (stIdx - 1 + STATIONS.length) % STATIONS.length; sgIdx = curStation().songs.length - 1; }
  loadAndMaybePlay(playing);
};
$("vol").oninput = e => audio.volume = parseFloat(e.target.value);
audio.addEventListener("ended", () => $("next").click());

/* Build station buttons */
const stEl = $("stations");
STATIONS.forEach((s,i) => {
  const b = document.createElement("button");
  b.innerHTML = `<span>0${i+1}</span><span>${s.horizon}</span>`;
  b.onclick = () => { stIdx = i; sgIdx = 0; loadAndMaybePlay(playing); };
  stEl.appendChild(b);
});
render();

/* ===== Neon road canvas ===== */
const cvs = $("bg"); const ctx = cvs.getContext("2d");
let W=0,H=0;
function resize(){
  const dpr = Math.min(devicePixelRatio||1, 2);
  W = innerWidth; H = innerHeight;
  cvs.width = W*dpr; cvs.height = H*dpr;
  ctx.setTransform(dpr,0,0,dpr,0,0);
}
addEventListener("resize", resize); resize();

const stars = Array.from({length:140}, () => ({
  x:Math.random(), y:Math.random()*0.55, s:Math.random()*1.6+0.3, tw:Math.random()
}));
let roadOffset = 0, t0 = performance.now();

function drawHorizonBody(p, kind, cx, cy, r){
  if (kind === "blackhole") {
    const g = ctx.createRadialGradient(cx,cy,r*0.2,cx,cy,r*1.6);
    g.addColorStop(0,"#000"); g.addColorStop(0.5,"#1a0033"); g.addColorStop(1,"#00000000");
    ctx.fillStyle = g; ctx.beginPath(); ctx.arc(cx,cy,r*1.6,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle = "#a06bff"; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.stroke();
  } else if (kind === "galaxy") {
    for (let i=0;i<5;i++){
      const a = (i/5)*Math.PI*2 + (performance.now()*0.0002);
      ctx.strokeStyle = `${p.sun1}${i===0?"":"88"}`;
      ctx.lineWidth = 2 - i*0.3;
      ctx.beginPath();
      for (let k=0;k<60;k++){
        const t = k/60, ang = a + t*Math.PI*4, rr = t*r*1.5;
        const x = cx + Math.cos(ang)*rr, y = cy + Math.sin(ang)*rr*0.4;
        if (k===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
      }
      ctx.stroke();
    }
  } else {
    const g = ctx.createLinearGradient(cx, cy-r, cx, cy+r);
    g.addColorStop(0, p.sun1); g.addColorStop(1, p.sun2);
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fill();
    // stripes
    ctx.strokeStyle = "#00000088"; ctx.lineWidth = 2;
    for (let i=1;i<7;i++){ const y = cy + r*0.2 + i*4; ctx.beginPath(); ctx.moveTo(cx-r+i*2,y); ctx.lineTo(cx+r-i*2,y); ctx.stroke(); }
  }
}

function frame(now){
  const p = curStation().pal;
  // Audio amp
  let amp = 0;
  if (analyser){
    const a = new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteFrequencyData(a);
    let s=0; for (let i=0;i<80;i++) s+=a[i]; amp = s/(80*255);
  }
  // Sky
  const sky = ctx.createLinearGradient(0,0,0,H*0.6);
  sky.addColorStop(0, p.sky1); sky.addColorStop(1, p.sky2);
  ctx.fillStyle = sky; ctx.fillRect(0,0,W,H*0.6);
  // Stars
  ctx.fillStyle = "#fff";
  stars.forEach(s => {
    const tw = 0.5 + 0.5*Math.sin(now*0.002 + s.tw*10);
    ctx.globalAlpha = 0.4 + 0.6*tw;
    ctx.fillRect(s.x*W, s.y*H*0.9, s.s, s.s);
  });
  ctx.globalAlpha = 1;
  // Horizon body
  drawHorizonBody(p, curStation().horizon, W/2, H*0.5, 70 + amp*30);
  // Ground
  ctx.fillStyle = p.road; ctx.fillRect(0,H*0.55,W,H*0.45);
  // Grid
  roadOffset = (roadOffset + 2 + amp*4) % 40;
  ctx.strokeStyle = p.grid; ctx.lineWidth = 1; ctx.globalAlpha = 0.7;
  // horizontal lines (perspective)
  for (let i=0;i<20;i++){
    const t = (i*40 + roadOffset)/800;
    const y = H*0.55 + Math.pow(t,2)*H*0.5;
    if (y > H) break;
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
  }
  // vanishing vertical lines
  for (let i=-6;i<=6;i++){
    ctx.beginPath();
    ctx.moveTo(W/2 + i*60, H*0.55);
    ctx.lineTo(W/2 + i*W*0.5, H);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
